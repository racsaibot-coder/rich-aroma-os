<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Toy Machine!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background-color: #ffebf0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }
        h1 {
            color: #ff4081;
            font-size: 3rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        #machine {
            background-color: #81d4fa;
            border: 8px solid #039be5;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #display-window {
            background-color: white;
            border: 4px solid #b3e5fc;
            border-radius: 10px;
            width: 80%;
            height: 200px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            overflow: hidden;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.1);
        }
        .toy {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        #big-button {
            background-color: #ff5252;
            color: white;
            border: none;
            border-radius: 50px;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 0 #d50000, 0 15px 20px rgba(0,0,0,0.3);
            transition: all 0.1s;
            outline: none;
        }
        #big-button:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 #d50000, 0 5px 10px rgba(0,0,0,0.3);
        }
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            opacity: 0;
        }
        #slot {
            width: 150px;
            height: 30px;
            background-color: #01579b;
            border-radius: 5px;
            margin-top: 30px;
            position: relative;
        }
        #slot::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background-color: #000;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>Magic Toy Machine!</h1>
    <div id="machine">
        <div id="display-window">
            <span id="toy-display">✨</span>
        </div>
        <button id="big-button">MAKE TOY!</button>
        <div id="slot"></div>
    </div>

    <script>
        const toys = ['🧸', '🚗', '🎈', '🤖', '🧩', '🦄', '🦖', '🚀', '⚽', '🚂', '🚁', '🎨', '🎺', '🪀', '🎸'];
        const button = document.getElementById('big-button');
        const display = document.getElementById('toy-display');
        
        // Sound effects
        const popSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2144/2144-preview.mp3');
        const machineSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        
        button.addEventListener('click', () => {
            // Play machine sound
            machineSound.currentTime = 0;
            machineSound.play();
            
            // Show making process
            display.innerHTML = '⚙️';
            display.classList.remove('toy');
            display.style.animation = 'spin 0.5s infinite linear';
            
            button.disabled = true;
            button.style.backgroundColor = '#ccc';
            button.style.boxShadow = '0 8px 0 #999';
            
            // Add custom animation for spinning
            if (!document.getElementById('spin-anim')) {
                const style = document.createElement('style');
                style.id = 'spin-anim';
                style.innerHTML = '@keyframes spin { 100% { transform: rotate(360deg); } }';
                document.head.appendChild(style);
            }
            
            setTimeout(() => {
                // Pick random toy
                const randomToy = toys[Math.floor(Math.random() * toys.length)];
                
                display.style.animation = '';
                display.innerHTML = randomToy;
                display.classList.add('toy');
                
                // Play pop sound
                popSound.currentTime = 0;
                popSound.play();
                
                createConfetti();
                
                button.disabled = false;
                button.style.backgroundColor = '#ff5252';
                button.style.boxShadow = '0 8px 0 #d50000, 0 15px 20px rgba(0,0,0,0.3)';
            }, 1000);
        });
        
        function createConfetti() {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4caf50', '#8bc34a', '#cddc39', '#ffeb3b', '#ffc107', '#ff9800', '#ff5722'];
            const machine = document.getElementById('machine');
            
            for (let i = 0; i < 30; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Random position inside machine
                const startX = machine.offsetWidth / 2;
                const startY = 100;
                
                confetti.style.left = startX + 'px';
                confetti.style.top = startY + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Random shapes
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                machine.appendChild(confetti);
                
                // Animate
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                const endX = startX + Math.cos(angle) * velocity;
                const endY = startY + Math.sin(angle) * velocity + 200;
                
                confetti.animate([
                    { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(${endX - startX}px, ${endY - startY}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
                ], {
                    duration: 1000 + Math.random() * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)'
                }).onfinish = () => confetti.remove();
            }
        }
    </script>
</body>
</html>
