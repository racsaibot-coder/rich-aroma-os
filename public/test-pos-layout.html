<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | POS Zero-Scroll Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0c0a09; color: white; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
        .pos-grid { display: grid; grid-template-columns: 80px 1fr 320px; height: 100vh; }
        .sidebar { background-color: #1c1917; border-right: 1px solid #292524; display: flex; flex-direction: column; align-items: center; padding: 1rem 0; gap: 1rem; }
        .menu-area { padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1.5rem; }
        .hero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
        .cart-area { background-color: #1c1917; border-left: 1px solid #292524; display: flex; flex-direction: column; height: 100vh; }
        .cart-items { flex: 1; overflow-y: auto; padding: 1rem; }
        
        .cat-btn { width: 60px; height: 60px; border-radius: 16px; display: flex; flex-direction: column; items-center; justify-center; font-size: 8px; font-weight: 800; text-transform: uppercase; color: #a8a29e; transition: all 0.2s; border: 1px solid transparent; }
        .cat-btn i { font-size: 1.2rem; margin-bottom: 4px; }
        .cat-btn.active { background-color: #C9A66B; color: #1c1917; box-shadow: 0 0 15px rgba(201, 166, 107, 0.3); }

        .item-btn { background-color: #292524; border: 1px solid #44403c; border-radius: 16px; padding: 1rem; text-align: left; transition: all 0.2s; position: relative; overflow: hidden; height: 100px; display: flex; flex-direction: column; justify-content: space-between; }
        .item-btn:active { transform: scale(0.95); background-color: #44403c; }
        .item-btn .price { color: #C9A66B; font-weight: 900; font-size: 14px; }
        .item-btn .name { font-weight: 700; font-size: 13px; line-height: 1.2; }
        
        .checkout-btn { background: linear-gradient(135deg, #C9A66B 0%, #E2C299 100%); color: #1c1917; font-weight: 900; border-radius: 16px; padding: 1.5rem; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; font-size: 1.1rem; box-shadow: 0 10px 25px rgba(201, 166, 107, 0.2); }
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #292524; }
        .cart-row .name { font-size: 12px; font-weight: 600; }
        .cart-row .qty { background: #44403c; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-right: 8px; }

        /* Hide scrollbars for true zero-scroll feel */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body>

    <div class="pos-grid">
        <!-- FIXED SIDEBAR (CATEGORIES) -->
        <aside class="sidebar">
            <img src="/rico-logo.png" class="w-10 h-10 rounded-full mb-4 opacity-50">
            <button class="cat-btn active">
                <i class="fas fa-star"></i>
                Héroes
            </button>
            <button class="cat-btn">
                <i class="fas fa-mug-hot"></i>
                Café
            </button>
            <button class="cat-btn">
                <i class="fas fa-utensils"></i>
                Comida
            </button>
            <button class="cat-btn">
                <i class="fas fa-bread-slice"></i>
                Sourdough
            </button>
            <button class="cat-btn mt-auto">
                <i class="fas fa-cog"></i>
                Config
            </button>
        </aside>

        <!-- MAIN MENU AREA -->
        <main class="menu-area">
            <div>
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-stone-500 mb-4">Productos Estrella</h3>
                <div class="hero-grid">
                    <button class="item-btn">
                        <span class="name">Baleada Sencilla</span>
                        <span class="price">L. 35</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Baleada Especial</span>
                        <span class="price">L. 65</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Americano 8oz</span>
                        <span class="price">L. 45</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Latte 12oz</span>
                        <span class="price">L. 65</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Cappuccino</span>
                        <span class="price">L. 65</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Frappe Mocha</span>
                        <span class="price">L. 85</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Frappe Oreo</span>
                        <span class="price">L. 95</span>
                    </button>
                    <button class="item-btn">
                        <span class="name">Muffin de Café</span>
                        <span class="price">L. 45</span>
                    </button>
                </div>
            </div>

            <div>
                <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-stone-500 mb-4">Recientes (Live Feed)</h3>
                <div class="space-y-2">
                    <div class="bg-[#1c1917] p-3 rounded-xl border border-white/5 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-black text-stone-600">#124</span>
                            <span class="text-sm font-bold">Juan Perez</span>
                        </div>
                        <span class="text-[10px] bg-orange-500/20 text-orange-400 px-2 py-1 rounded-full font-black">COCINA</span>
                    </div>
                    <div class="bg-[#1c1917] p-3 rounded-xl border border-white/5 flex justify-between items-center opacity-50">
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-black text-stone-600">#123</span>
                            <span class="text-sm font-bold">Maria G.</span>
                        </div>
                        <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-1 rounded-full font-black">ENTREGADA</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- CART & CHECKOUT AREA -->
        <section class="cart-area">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h2 class="text-lg font-black tracking-tight">CUENTA</h2>
                <button class="text-stone-500 hover:text-white"><i class="fas fa-trash-alt"></i></button>
            </div>

            <div class="cart-items">
                <div class="cart-row">
                    <div>
                        <span class="qty">1x</span>
                        <span class="name">Baleada Especial</span>
                    </div>
                    <span class="font-bold text-xs">L. 65</span>
                </div>
                <div class="cart-row border-none">
                    <div>
                        <span class="qty">2x</span>
                        <span class="name">Americano 8oz</span>
                    </div>
                    <span class="font-bold text-xs">L. 90</span>
                </div>
            </div>

            <div class="p-6 space-y-4 bg-stone-900/50">
                <div class="flex justify-between text-stone-400 font-bold text-xs">
                    <span>Subtotal</span>
                    <span>L. 155.00</span>
                </div>
                <div class="flex justify-between text-xl font-black">
                    <span>TOTAL</span>
                    <span class="text-gold">L. 155.00</span>
                </div>
                <button class="checkout-btn w-full flex items-center justify-center gap-3">
                    <i class="fas fa-money-bill-wave"></i>
                    Cobrar (Enter)
                </button>
            </div>
        </section>
    </div>

</body>
</html>
