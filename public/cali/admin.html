<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cali Distro Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#1e1b18',
                            brown: '#8b5a2b',
                            cream: '#fdfbf7',
                            gold: '#d4af37'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased">
    <div class="max-w-6xl mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-serif font-bold text-brand-dark">Cali Distro HQ</h1>
                <p class="text-gray-500 text-sm">Manage products, drops, and orders for California.</p>
            </div>
            <div class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider block">Status</span>
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-sm font-semibold">Live / Taking Orders</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Column: Products -->
            <div class="lg:col-span-2 space-y-8">
                <!-- Products Panel -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold font-serif">Products & Packages</h2>
                        <button onclick="openProductModal()" class="text-brand-brown hover:text-brand-dark text-sm font-semibold"><i class="fas fa-plus"></i> Add Product</button>
                    </div>

                    <div class="space-y-4" id="products-list">
                        <div class="text-gray-500 italic p-4 text-center">Loading products...</div>
                    </div>
                </div>

                <!-- Drop Locations Panel -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold font-serif">Drop Locations (Distributors)</h2>
                        <button onclick="openLocationModal()" class="text-brand-brown hover:text-brand-dark text-sm font-semibold"><i class="fas fa-plus"></i> Add Location</button>
                    </div>

                    <div class="grid sm:grid-cols-2 gap-4" id="locations-list">
                        <div class="text-gray-500 italic p-4 text-center col-span-2">Loading locations...</div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Orders & Stats -->
            <div class="space-y-8">
                <!-- Stats -->
                <div class="bg-brand-dark text-white rounded-2xl shadow-xl p-6 relative overflow-hidden">
                    <div class="absolute top-0 right-0 -mt-8 -mr-8 w-32 h-32 bg-brand-gold rounded-full opacity-20 blur-2xl"></div>
                    <h2 class="text-lg font-serif font-bold mb-4 opacity-90">Total Revenue</h2>
                    <div class="text-4xl font-bold mb-1" id="total-revenue">$0.00</div>
                    <p class="text-sm text-gray-400 mb-6"><span id="total-orders">0</span> Orders collected</p>
                </div>

                <!-- Recent Orders -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                    <h2 class="text-xl font-bold font-serif mb-4">Recent Orders</h2>
                    <div id="orders-list" class="space-y-3">
                        <div class="text-center py-8 text-gray-400">
                            <i class="fas fa-receipt text-3xl mb-2 opacity-50"></i>
                            <p class="text-sm">Loading orders...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl">
            <h2 class="text-xl font-bold font-serif mb-4" id="product-modal-title">Add Package</h2>
            <input type="hidden" id="prod-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Product Name</label>
                    <input type="text" id="prod-name" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Price ($)</label>
                        <input type="number" id="prod-price" step="0.01" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Bottles per Pack</label>
                        <input type="number" id="prod-bottles" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Image URL</label>
                    <div class="flex gap-2">
                        <input type="text" id="prod-image" class="flex-1 border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown" placeholder="Optional">
                        <input type="file" id="prod-image-file" accept="image/*" class="hidden" onchange="uploadImage(this, 'prod-image', 'prod-upload-btn')">
                        <button type="button" onclick="document.getElementById('prod-image-file').click()" class="bg-gray-100 text-gray-700 px-4 rounded-lg font-bold hover:bg-gray-200 transition" id="prod-upload-btn">
                            <i class="fas fa-upload"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Inventory Limit</label>
                    <input type="number" id="prod-limit" placeholder="Leave blank for unlimited" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="prod-active" checked class="w-5 h-5 accent-brand-gold">
                    <label class="text-sm font-bold text-gray-700">Active (Visible on store)</label>
                </div>
            </div>
            <div class="flex justify-between items-center mt-6">
                <button onclick="deleteProduct()" id="prod-del-btn" class="hidden text-red-500 hover:text-red-700 text-sm font-bold"><i class="fas fa-trash"></i> Delete</button>
                <div class="flex gap-3 ml-auto">
                    <button onclick="document.getElementById('product-modal').classList.add('hidden')" class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg font-bold hover:bg-gray-200">Cancel</button>
                    <button onclick="saveProduct()" id="prod-save-btn" class="bg-brand-dark text-white px-4 py-2 rounded-lg font-bold hover:bg-brand-brown">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Location Modal -->
    <div id="location-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md p-6 rounded-2xl">
            <h2 class="text-xl font-bold font-serif mb-4" id="loc-modal-title">Edit Location</h2>
            <input type="hidden" id="loc-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location Name</label>
                    <input type="text" id="loc-name" placeholder="e.g. Kaiser Permanente" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">City / Region</label>
                    <input type="text" id="loc-city" placeholder="e.g. Anaheim, CA" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Distributor Name</label>
                    <input type="text" id="loc-distro" placeholder="e.g. Sister 1" class="w-full border border-gray-300 rounded-lg p-2 outline-none focus:border-brand-brown">
                </div>
                <div class="flex items-center gap-2 mt-2">
                    <input type="checkbox" id="loc-active" checked class="w-5 h-5 accent-brand-gold">
                    <label class="text-sm font-bold text-gray-700">Active (Accepting Orders)</label>
                </div>
            </div>
            <div class="flex justify-between items-center mt-8 pt-4 border-t border-gray-100">
                <div class="flex gap-3 ml-auto">
                    <button onclick="document.getElementById('location-modal').classList.add('hidden')" class="bg-gray-100 text-gray-800 px-4 py-2 rounded-lg font-bold hover:bg-gray-200">Cancel</button>
                    <button onclick="saveLocation()" id="loc-save-btn" class="bg-brand-dark text-white px-4 py-2 rounded-lg font-bold hover:bg-brand-brown">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Use local token or setup admin mechanism
        const headers = { 'Authorization': `Bearer ${localStorage.getItem('token') || 'TEST_TOKEN_ADMIN'}`, 'Content-Type': 'application/json' };

        async function init() {
            await loadProducts();
            await loadLocations();
        }


        async function loadLocations() {
            try {
                const res = await fetch('/api/cali/locations', { headers });
                const locations = await res.json();
                const container = document.getElementById('locations-list');
                
                if (!locations || locations.length === 0) {
                    container.innerHTML = '<div class="text-gray-500 italic p-4 text-center col-span-2">No locations found. Add one above.</div>';
                    return;
                }

                container.innerHTML = locations.map(l => `
                    <div class="bg-white p-4 rounded-xl border border-gray-100 flex justify-between items-start ${l.active ? '' : 'opacity-50'}">
                        <div>
                            <h4 class="font-bold">${l.name}</h4>
                            <p class="text-xs text-gray-500"><i class="fas fa-map-marker-alt"></i> ${l.city}</p>
                            <p class="text-xs text-brand-brown font-semibold mt-1"><i class="fas fa-user-circle"></i> ${l.distributor_name}</p>
                        </div>
                        <button onclick="openLocationModal('${l.id}')" class="text-gray-400 hover:text-brand-brown"><i class="fas fa-edit"></i></button>
                    </div>
                `).join('');
            } catch (e) { console.error('Failed to load locations', e); }
        }

        async function openLocationModal(id = null) {
            document.getElementById('location-modal').classList.remove('hidden');
            const title = document.getElementById('loc-modal-title');
            
            if (id && typeof id === 'string') {
                title.innerText = 'Edit Location';
                try {
                    const res = await fetch('/api/cali/locations', { headers });
                    const locations = await res.json();
                    const l = locations.find(x => x.id === id);
                    if (l) {
                        document.getElementById('loc-id').value = l.id;
                        document.getElementById('loc-name').value = l.name;
                        document.getElementById('loc-city').value = l.city;
                        document.getElementById('loc-distro').value = l.distributor_name;
                        document.getElementById('loc-active').checked = l.active;
                    }
                } catch(e) { console.error(e); }
            } else {
                title.innerText = 'Add Location';
                document.getElementById('loc-id').value = '';
                document.getElementById('loc-name').value = '';
                document.getElementById('loc-city').value = '';
                document.getElementById('loc-distro').value = '';
                document.getElementById('loc-active').checked = true;
            }
        }

        async function saveLocation() {
            const id = document.getElementById('loc-id').value;
            const payload = {
                name: document.getElementById('loc-name').value,
                city: document.getElementById('loc-city').value,
                distributor_name: document.getElementById('loc-distro').value,
                active: document.getElementById('loc-active').checked
            };

            const btn = document.getElementById('loc-save-btn');
            btn.disabled = true; btn.innerText = 'Saving...';

            try {
                const url = id ? `/api/cali/locations/${id}` : '/api/cali/locations';
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers, body: JSON.stringify(payload) });
                if (res.ok) {
                    document.getElementById('location-modal').classList.add('hidden');
                    loadLocations();
                } else alert('Error saving location');
            } catch(e) { console.error(e); } finally {
                btn.disabled = false; btn.innerText = 'Save';
            }
        }

        async function loadProducts() {
            try {
                const res = await fetch('/api/cali/products', { headers });
                const products = await res.json();
                const container = document.getElementById('products-list');
                
                if (!products || products.length === 0) {
                    container.innerHTML = '<div class="text-gray-500 italic p-4 text-center">No products found. Add one above.</div>';
                    return;
                }

                container.innerHTML = products.map(p => `
                    <div class="flex items-center justify-between p-4 border border-gray-100 rounded-xl hover:shadow-md transition ${p.active ? '' : 'opacity-50'}">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-gray-100 rounded-lg flex items-center justify-center text-xl overflow-hidden">
                                ${p.image_url ? `<img src="${p.image_url}" class="w-full h-full object-cover">` : '☕'}
                            </div>
                            <div>
                                <h3 class="font-bold">${p.name} ${!p.active ? '<span class="text-xs text-red-500 ml-2">(Inactive)</span>' : ''}</h3>
                                <p class="text-sm text-gray-500">Inventory: ${p.inventory_limit === null ? '<span class="text-green-600 font-bold">Unlimited</span>' : `<span class="text-brand-brown font-bold">${p.inventory_limit} left</span>`}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <span class="font-bold font-mono">$${parseFloat(p.price).toFixed(2)}</span>
                            <button onclick="openProductModal('${p.id}')" class="text-gray-400 hover:text-brand-brown"><i class="fas fa-edit"></i></button>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error('Failed to load products', e);
            }
        }

        async function openProductModal(id = null) {
            document.getElementById('product-modal').classList.remove('hidden');
            const title = document.getElementById('product-modal-title');
            const delBtn = document.getElementById('prod-del-btn');
            
            if (id && typeof id === 'string') {
                title.innerText = 'Edit Package';
                delBtn.classList.remove('hidden');
                
                // Fetch product details
                try {
                    const res = await fetch('/api/cali/products', { headers });
                    const products = await res.json();
                    const p = products.find(x => x.id === id);
                    if (p) {
                        document.getElementById('prod-id').value = p.id;
                        document.getElementById('prod-name').value = p.name;
                        document.getElementById('prod-price').value = p.price;
                        document.getElementById('prod-bottles').value = p.bottles_per_pack;
                        document.getElementById('prod-image').value = p.image_url || '';
                        document.getElementById('prod-limit').value = p.inventory_limit !== null ? p.inventory_limit : '';
                        document.getElementById('prod-active').checked = p.active;
                    }
                } catch(e) { console.error(e); }
            } else {
                title.innerText = 'Add Package';
                delBtn.classList.add('hidden');
                document.getElementById('prod-id').value = '';
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-price').value = '';
                document.getElementById('prod-bottles').value = '1';
                document.getElementById('prod-image').value = '';
                document.getElementById('prod-limit').value = '';
                document.getElementById('prod-active').checked = true;
            }
        }

        async function saveProduct() {
            const id = document.getElementById('prod-id').value;
            const limitVal = document.getElementById('prod-limit').value;
            
            const payload = {
                name: document.getElementById('prod-name').value,
                price: parseFloat(document.getElementById('prod-price').value),
                bottles_per_pack: parseInt(document.getElementById('prod-bottles').value),
                image_url: document.getElementById('prod-image').value,
                inventory_limit: limitVal ? parseInt(limitVal) : null,
                active: document.getElementById('prod-active').checked
            };

            const btn = document.getElementById('prod-save-btn');
            btn.disabled = true; btn.innerText = 'Saving...';

            try {
                const url = id ? `/api/cali/products/${id}` : '/api/cali/products';
                const method = id ? 'PUT' : 'POST';
                
                const res = await fetch(url, {
                    method,
                    headers,
                    body: JSON.stringify(payload)
                });
                
                if (res.ok) {
                    document.getElementById('product-modal').classList.add('hidden');
                    loadProducts();
                } else {
                    alert('Error saving product');
                }
            } catch(e) {
                console.error(e);
            } finally {
                btn.disabled = false; btn.innerText = 'Save Changes';
            }
        }
        
        async function deleteProduct() {
            const id = document.getElementById('prod-id').value;
            if(!confirm("Are you sure you want to delete this product?")) return;
            
            try {
                const res = await fetch(`/api/cali/products/${id}`, { method: 'DELETE', headers });
                if(res.ok) {
                    document.getElementById('product-modal').classList.add('hidden');
                    loadProducts();
                }
            } catch(e) { console.error(e); }
        }

        async function uploadImage(inputEl, targetInputId, btnId) {
            const file = inputEl.files[0];
            if (!file) return;

            const btn = document.getElementById(btnId);
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('/api/admin/upload-image', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token') || 'TEST_TOKEN_ADMIN'}` },
                    body: formData
                });
                
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById(targetInputId).value = data.url;
                } else {
                    alert('Error uploading image');
                }
            } catch(e) {
                console.error(e);
                alert('Upload failed');
            } finally {
                btn.innerHTML = '<i class="fas fa-upload"></i>';
                btn.disabled = false;
                inputEl.value = ''; 
            }
        }

        init();
    </script>
</body>
</html>
