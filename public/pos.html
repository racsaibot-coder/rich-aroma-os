<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma POS v3.3</title>
    <link rel="manifest" href="/pos-manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // AGGRESSIVE CACHE NUKE v3.3.0
        const POS_VERSION = '3.3.0';
        if (localStorage.getItem('ra_pos_version') !== POS_VERSION) {
            localStorage.setItem('ra_pos_version', POS_VERSION);
            console.log("New POS version detected, nuking cache and reloading...");
            localStorage.clear(); 
            window.location.reload(true);
        }
    </script>
    <style>
        body { background-color: #0c0a09; color: white; overflow: hidden; height: 100vh; font-family: 'Inter', sans-serif; }
        .pos-container { display: grid; grid-template-columns: 260px 1fr 340px; height: 100vh; width: 100vw; overflow: hidden; }
        .feed-col { background-color: #1c1917; border-right: 1px solid #292524; display: flex; flex-direction: column; overflow: hidden; }
        .menu-col { background-color: #0c0a09; display: flex; flex-direction: column; overflow: hidden; }
        .menu-grid-area { flex: 1; overflow-y: auto; padding: 1rem; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); grid-auto-rows: min-content; gap: 0.75rem; }
        .cart-col { background-color: #1c1917; border-left: 1px solid #292524; display: flex; flex-direction: column; overflow: hidden; }
        
        .pos-item-btn { background-color: #292524; border: 1px solid #44403c; border-radius: 14px; padding: 0.75rem; display: flex; align-items: center; gap: 0.75rem; transition: all 0.15s; cursor: pointer; min-height: 74px; position: relative; }
        .pos-item-btn:active { transform: scale(0.96); background-color: #44403c; }
        .pos-item-img { width: 48px; height: 48px; border-radius: 10px; object-fit: cover; background: #1c1917; flex-shrink: 0; }
        .pos-item-info { flex: 1; display: flex; flex-direction: column; text-align: left; overflow: hidden; }
        .pos-item-name { font-size: 10px; font-weight: 800; text-transform: uppercase; line-height: 1.2; color: #e7e5e4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pos-item-price { font-size: 13px; font-weight: 900; color: #C9A66B; margin-top: 2px; font-family: monospace; }
        
        .cat-tab { padding: 0.75rem 1rem; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 10px; transition: all 0.2s; white-space: nowrap; }
        .cat-tab.active { background: #C9A66B; color: #0c0a09; box-shadow: 0 4px 15px rgba(201, 166, 107, 0.2); }
        .cat-tab.inactive { background: #292524; color: #a8a29e; border: 1px solid #44403c; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #44403c; border-radius: 10px; }
        
        .blink-urgent { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    </style>
</head>
<body>

    <div class="pos-container">
        
        <!-- COLUMN 1: LIVE FEED -->
        <aside class="feed-col">
            <div class="p-4 bg-[#292524] border-b border-black flex justify-between items-center shrink-0">
                <div>
                    <h3 class="text-white font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        Feed
                    </h3>
                    <p id="hb-status" class="text-[8px] text-stone-500 font-bold uppercase mt-0.5 tracking-tighter">Syncing...</p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="fetchLiveOrders()" class="text-stone-500 hover:text-white transition-colors"><i class="fas fa-sync-alt text-[10px]"></i></button>
                    <span id="live-order-count" class="bg-blue-600 text-white text-[10px] px-2 py-0.5 rounded-full font-bold">0</span>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-2 custom-scrollbar" id="live-order-feed">
                <div class="text-center py-10 text-gray-600 text-xs italic">Connecting...</div>
            </div>
            
            <!-- Quick Verifications Alert -->
            <button id="verifyPaymentAlert" class="hidden m-2 bg-red-600 text-white font-black text-[10px] py-3 rounded-xl shadow-lg animate-bounce" onclick="openVerifyModal()">
               🚨 VERIFICAR PAGO (<span id="verifyCount">0</span>)
            </button>
        </aside>

        <!-- COLUMN 2: MENU AREA -->
        <main class="menu-col">
            <!-- Header -->
            <div class="p-3 bg-[#1c1917] flex justify-between items-center border-b border-stone-800 shrink-0">
                <div class="flex items-center gap-4">
                    <h1 class="text-sm font-black text-stone-200 tracking-widest" onclick="triggerAdmin()">RICH AROMA POS</h1>
                    <div class="flex items-center gap-2 bg-stone-900 px-3 py-1.5 rounded-full border border-stone-800 shadow-inner">
                        <span id="store-status-label" class="text-[9px] font-black text-green-500 px-1">OPEN</span>
                        <label class="relative inline-flex items-center cursor-pointer scale-75">
                            <input type="checkbox" id="store-status-toggle" class="sr-only peer" checked onchange="toggleStoreStatus(this)">
                            <div class="w-11 h-6 bg-stone-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                        </label>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="document.getElementById('config-menu').classList.toggle('hidden')" class="bg-stone-800 text-stone-400 px-3 py-2 rounded-xl font-black text-[9px] uppercase border border-stone-700">
                        Config ▾
                    </button>
                    <div id="config-menu" class="hidden absolute right-1/4 top-14 w-56 rounded-2xl shadow-2xl bg-white text-stone-900 border border-stone-200 z-[100] divide-y divide-gray-100 overflow-hidden">
                        <button onclick="toggleSoloMode(); document.getElementById('config-menu').classList.add('hidden')" class="w-full text-left px-4 py-4 hover:bg-stone-50 font-bold text-xs"><i class="fas fa-user-shield mr-2 text-orange-500"></i> Solo Mode</button>
                        <button onclick="printTestReceipt(); document.getElementById('config-menu').classList.add('hidden')" class="w-full text-left px-4 py-4 hover:bg-stone-50 font-bold text-xs"><i class="fas fa-print mr-2"></i> Printer Test</button>
                        <button onclick="endShift(); document.getElementById('config-menu').classList.add('hidden')" class="w-full text-left px-4 py-4 hover:bg-red-50 text-red-600 font-black text-xs"><i class="fas fa-door-closed mr-2"></i> CLOSE SHIFT</button>
                    </div>
                </div>
            </div>

            <!-- Categories -->
            <div class="p-3 bg-[#0c0a09] flex gap-2 overflow-x-auto custom-scrollbar shrink-0 border-b border-stone-900">
                <button id="cat-Heroes" onclick="filterCategory('Heroes', this)" class="cat-tab active">⭐ Héroes</button>
                <button id="cat-Combos" onclick="filterCategory('Combos', this)" class="cat-tab inactive">🔥 Combos</button>
                <button id="cat-Calientes" onclick="filterCategory('Calientes', this)" class="cat-tab inactive">☕ Calientes</button>
                <button id="cat-Heladas" onclick="filterCategory('Heladas', this)" class="cat-tab inactive">🥤 Heladas</button>
                <button id="cat-Comida" onclick="filterCategory('Comida', this)" class="cat-tab inactive">🥐 Comida</button>
                <button id="cat-Postres" onclick="filterCategory('Postres', this)" class="cat-tab inactive">🍰 Postres</button>
                <button id="cat-Sides" onclick="filterCategory('Sides', this)" class="cat-tab inactive">🍟 Sides</button>
                <button onclick="openCustomItemModal()" class="cat-tab inactive border-dashed border-purple-500/30 text-purple-400"><i class="fas fa-plus mr-1"></i> Custom</button>
            </div>

            <!-- Menu Grid -->
            <div class="menu-grid-area custom-scrollbar" id="menu-grid"></div>
        </main>

        <!-- COLUMN 3: CART AREA -->
        <section class="cart-col">
            <!-- Customer Section -->
            <div class="p-4 border-b border-stone-800 bg-[#292524] shrink-0">
                <div id="cust-lookup-ui" class="space-y-3">
                    <div class="flex gap-1">
                        <input type="text" placeholder="Teléfono" class="flex-1 p-3 bg-stone-900 border border-stone-700 rounded-xl focus:border-gold outline-none font-bold text-sm text-white" id="cust-id">
                        <button onclick="lookupCustomer()" class="bg-stone-100 text-stone-900 px-4 rounded-xl font-bold"><i class="fas fa-search text-xs"></i></button>
                    </div>
                    <input type="text" id="guest-name-input" placeholder="Nombre de Cliente" class="w-full p-3 bg-stone-900 border border-stone-700 rounded-xl focus:border-orange-500 outline-none text-[10px] font-black uppercase text-white">
                </div>
                <div id="cust-profile" class="hidden"></div>
            </div>

            <!-- Cart Items -->
            <div class="flex-1 overflow-y-auto p-4 custom-scrollbar" id="cart-items">
                <div class="text-center text-stone-700 mt-20 text-[10px] font-black uppercase tracking-[0.3em]">Carrito Vacío</div>
            </div>

            <!-- Order Footer -->
            <div class="p-4 bg-[#292524] border-t border-stone-800 shrink-0 space-y-4">
                <div class="flex justify-between items-center gap-2">
                    <button onclick="setFulfillment('dinein')" id="btn-fulfill-dinein" class="flex-1 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest border-2 border-stone-700 text-stone-400">Aqui</button>
                    <button onclick="setFulfillment('pickup')" id="btn-fulfill-pickup" class="flex-1 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest border-2 border-stone-700 text-stone-400">Llevar</button>
                </div>
                
                <div class="flex justify-between items-end px-2">
                    <span class="text-stone-500 font-black text-[9px] uppercase">Total:</span>
                    <span id="cart-total" class="text-3xl font-black text-white font-mono tracking-tighter">L. 0.00</span>
                </div>

                <div class="flex gap-2">
                    <button onclick="submitPendingOrder()" class="p-4 bg-stone-800 text-stone-500 rounded-2xl hover:text-white transition-all"><i class="fas fa-paper-plane"></i></button>
                    <button onclick="openTenderModal()" id="main-charge-btn" class="flex-1 bg-gradient-to-br from-[#C9A66B] to-[#B08D55] text-stone-950 py-5 rounded-2xl font-black text-lg shadow-xl uppercase tracking-widest active:scale-95 transition-all">
                        CHARGE
                    </button>
                </div>
                
                <div class="flex justify-center">
                    <button onclick="toggleSplitMode()" id="split-toggle-btn" class="text-[8px] font-black text-stone-600 uppercase tracking-widest hover:text-gold transition-colors">
                        <i class="fas fa-columns mr-1"></i> Dividir Cuenta
                    </button>
                </div>
            </div>
        </section>
    </div>

    <!-- MODALS (Hidden) -->
    <div id="pin-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[200] flex items-center justify-center p-4"></div>
    <div id="shift-modal" class="hidden fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center z-[200] backdrop-blur-md"></div>
    <div id="recarga-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-[200] backdrop-blur-sm"></div>
    <div id="tender-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[200] backdrop-blur-sm p-4"></div>
    <div id="admin-pin-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[200] flex items-center justify-center p-4"></div>
    <div id="admin-dashboard" class="hidden fixed inset-0 bg-gray-100 z-[300] flex flex-col"></div>
    <div id="custom-item-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[200] flex items-center justify-center p-4"></div>
    <div id="modifier-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 z-[200] flex items-center justify-center p-4"></div>
    <div id="kitchen-modal" class="hidden fixed inset-0 bg-black bg-opacity-70 z-[200] flex items-center justify-center p-4"></div>
    <div id="shift-close-modal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[300] flex items-center justify-center p-4"></div>
    <div id="verifyModal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[300] flex items-center justify-center p-4"></div>
    <div id="shiftReportModal" class="hidden fixed inset-0 bg-black bg-opacity-90 z-[300] flex items-center justify-center p-4"></div>

    <!-- AUDIO ELEMENTS -->
    <audio id="dingSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    // CORE POS SCRIPT v3.3.0
    let menu = [];
    let modGroups = [];
    let modOptions = [];
    let itemModGroups = [];
    let cart = [];
    let isSplitMode = false;
    let selectedIndices = [];
    let liveOrders = [];
    let pendingVerifications = [];
    
    let currentCashier = null;
    let currentShiftId = null;
    let startingCash = 0;
    let currentTenderMethod = 'cash';
    let fulfillmentType = 'dinein';
    let currentOrderId = null;
    let currentCustomerId = null;
    window.loadedCustomer = null;
    let isSoloMode = false;
    let currentQuantity = 1;
    let currentMods = {};
    let currentItem = null;

    window.onload = async () => {
        await refreshMenu();
        await restoreShift();
        restoreCart();
        filterCategory('Heroes'); // Default category
        fetchLiveOrders();
        fetchStoreStatus();
        fetchPendingVerifications();
        setInterval(fetchLiveOrders, 10000);
        setInterval(fetchPendingVerifications, 10000);
        setInterval(fetchStoreStatus, 30000);
    };

    async function refreshMenu() {
        try {
            const res = await fetch('/api/menu?admin=true', { headers: { 'Authorization': 'Bearer EMP-admin' } });
            const data = await res.json();
            menu = (data.items || []).map(i => ({
                ...i, 
                price: parseFloat(i.price) || 0,
                available: i.available !== false,
                image: i.image_url || i.image || null
            }));
            modGroups = data.modGroups || [];
            modOptions = data.modOptions || [];
            itemModGroups = data.itemModGroups || [];
            renderMenu();
        } catch (e) { console.error("Menu fetch failed", e); }
    }

    async function restoreShift() {
        const modal = document.getElementById('shift-modal');
        const saved = localStorage.getItem('pos_active_shift');
        if (saved) {
            try {
                const s = JSON.parse(saved);
                currentShiftId = s.shiftId;
                currentCashier = s.cashier;
                startingCash = s.startingCash;
                modal.classList.add('hidden');
                return;
            } catch(e) {}
        }
        renderShiftModal();
        modal.classList.remove('hidden');
    }

    function renderShiftModal() {
        const modal = document.getElementById('shift-modal');
        modal.innerHTML = `
            <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 text-center border-t-8 border-gold">
                <div id="login-stage">
                    <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase tracking-tighter">Staff Login</h2>
                    <input type="password" id="login-pin" maxlength="4" onkeyup="if(event.key==='Enter') handleLogin()" class="text-center text-5xl tracking-[0.5em] w-full border-b-4 border-gray-100 p-4 mb-8 outline-none font-black text-gold" placeholder="****">
                    <button onclick="handleLogin()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Entrar</button>
                </div>
                <div id="open-shift-stage" class="hidden">
                    <h2 class="text-2xl font-black text-gray-800 mb-2 uppercase tracking-tighter" id="welcome-msg"></h2>
                    <input type="number" id="shift-cash" onkeyup="if(event.key==='Enter') confirmStartShift()" class="text-center text-5xl w-full border-b-4 border-gray-100 p-4 mb-8 outline-none font-black text-green-600" placeholder="0.00">
                    <button onclick="confirmStartShift()" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase tracking-widest">Abrir Registro</button>
                </div>
            </div>
        `;
    }

    async function handleLogin() {
        const pin = document.getElementById('login-pin').value;
        const res = await fetch('/api/cash/verify-pin', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pin }) });
        const data = await res.json();
        if (res.ok) {
            window.currentEmployee = data.employee;
            document.getElementById('login-stage').classList.add('hidden');
            document.getElementById('open-shift-stage').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Hola, ${data.employee.name}`;
        } else alert(data.error);
    }

    async function confirmStartShift() {
        const cash = document.getElementById('shift-cash').value;
        const res = await fetch('/api/cash/open-shift', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ employeeId: window.currentEmployee.id, openingAmount: parseFloat(cash) }) });
        const data = await res.json();
        if (res.ok) {
            currentShiftId = data.id;
            currentCashier = window.currentEmployee.name;
            startingCash = parseFloat(cash);
            localStorage.setItem('pos_active_shift', JSON.stringify({ shiftId: data.id, cashier: currentCashier, startingCash }));
            document.getElementById('shift-modal').classList.add('hidden');
        }
    }

    function renderMenu() { renderMenuGrid(menu); }

    function renderMenuGrid(items) {
        const grid = document.getElementById('menu-grid');
        grid.innerHTML = (items || []).map(item => {
            const isSoldOut = !item.available;
            const clickAction = isSoldOut ? `alert('Sold Out')` : `openModifier('${item.id}')`;
            return `
                <button onclick="${clickAction}" class="pos-item-btn ${isSoldOut ? 'opacity-40 grayscale' : ''}">
                    ${item.image ? `<img src="${item.image}" class="pos-item-img">` : `<div class="pos-item-img bg-stone-800 flex items-center justify-center text-[10px] text-stone-500 font-bold">NO IMG</div>`}
                    <div class="pos-item-info">
                        <span class="pos-item-name">${item.name}</span>
                        <span class="pos-item-price">L. ${item.price.toFixed(0)}</span>
                    </div>
                </button>
            `;
        }).join('');
    }

    function filterCategory(cat, btnEl) {
        document.querySelectorAll('.cat-tab').forEach(b => { b.classList.remove('active'); b.classList.add('inactive'); });
        if(btnEl) { btnEl.classList.remove('inactive'); btnEl.classList.add('active'); }
        else { const def = document.getElementById(`cat-${cat}`); if(def) { def.classList.remove('inactive'); def.classList.add('active'); } }

        if (cat === 'Heroes') {
            const heroes = ['food_baleadas', 'hot_latte', 'hot_americano', 'cold_supreme_frappe', 'food_chicken_melt', 'cold_fresa_frappe'];
            renderMenuGrid(menu.filter(i => heroes.includes(i.id)));
            return;
        }

        const search = cat.toLowerCase();
        let filtered = menu.filter(i => {
            const itemCat = (i.category || '').toLowerCase();
            const itemId = (i.id || '').toLowerCase();
            if (search === 'combos') return itemId.startsWith('combo_');
            if (search === 'calientes') return itemCat.includes('hot') || itemCat.includes('caliente');
            if (search === 'heladas') return itemCat.includes('cold') || itemCat.includes('frappe') || itemCat.includes('helada');
            if (search === 'comida') return itemCat.includes('food') || itemCat.includes('comida');
            return itemCat.includes(search);
        });

        // Apply Established Sorts
        if (search === 'comida') {
            const sortOrder = ['food_avocado_toast_huevo','food_banano_almond_toast','food_chicken_salad_bowl','food_baleadas','food_chicken_melt'];
            filtered.sort((a,b) => sortOrder.indexOf(a.id) - sortOrder.indexOf(b.id));
        }

        renderMenuGrid(filtered);
    }

    function openModifier(id) {
        currentItem = menu.find(i => i.id === id);
        currentQuantity = 1;
        currentMods = {};
        
        const relevantGroupIds = itemModGroups.filter(img => img.item_id === id).map(img => img.group_id);
        relevantGroupIds.forEach(gid => {
            const defs = modOptions.filter(o => o.group_id === gid && o.is_default);
            if (defs.length) currentMods[gid] = defs.map(d => d.id);
        });

        const modal = document.getElementById('modifier-modal');
        modal.classList.remove('hidden');
        modal.innerHTML = `
            <div class="bg-white w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col overflow-hidden">
                <div class="p-6 bg-gray-50 border-b flex justify-between items-center">
                    <div><h2 class="text-2xl font-black text-gray-900">${currentItem.name}</h2><p class="text-gold font-bold">L. ${currentItem.price}</p></div>
                    <button onclick="closeModal()" class="text-2xl text-gray-400">&times;</button>
                </div>
                <div class="p-6 flex-1 overflow-y-auto space-y-6" id="mod-container"></div>
                <div class="p-6 border-t bg-gray-50 flex gap-4 items-center">
                    <div class="flex items-center gap-3 bg-white p-2 rounded-xl border">
                        <button onclick="changeQuantity(-1)" class="w-10 h-10 bg-gray-100 rounded-lg">-</button>
                        <span id="mod-qty-val" class="font-black w-6 text-center text-gray-900">1</span>
                        <button onclick="changeQuantity(1)" class="w-10 h-10 bg-gold text-dark rounded-lg">+</button>
                    </div>
                    <button onclick="confirmItem()" class="flex-1 bg-gray-900 text-white py-4 rounded-xl font-black uppercase tracking-widest">Add to Order</button>
                </div>
            </div>
        `;
        renderModGroups(relevantGroupIds);
    }

    function renderModGroups(gids) {
        const container = document.getElementById('mod-container');
        container.innerHTML = gids.map(gid => {
            const g = modGroups.find(x => x.id === gid);
            const opts = modOptions.filter(o => o.group_id === gid);
            const selected = currentMods[gid] || [];
            return `
                <div>
                    <h3 class="text-[10px] font-black text-gray-400 uppercase mb-3">${g.name}</h3>
                    <div class="grid grid-cols-2 gap-2">
                        ${opts.map(o => `
                            <button onclick="toggleMod('${gid}','${o.id}',${g.max_selections},'${currentItem.id}')" 
                                class="p-3 border-2 rounded-xl text-xs font-bold text-left transition-all ${selected.includes(o.id) ? 'border-gold bg-gold/5 text-gray-900' : 'border-gray-100 text-gray-500'}">
                                ${o.name} ${o.price_adjustment > 0 ? `<span class="text-green-600 ml-1">+L.${o.price_adjustment}</span>` : ''}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function toggleMod(gid, oid, max, itemId) {
        let sel = currentMods[gid] || [];
        if (sel.includes(oid)) sel = sel.filter(x => x !== oid);
        else { if (max === 1) sel = [oid]; else if (sel.length < max) sel.push(oid); }
        currentMods[gid] = sel;
        renderModGroups(itemModGroups.filter(img => img.item_id === itemId).map(img => img.group_id));
    }

    function changeQuantity(n) { currentQuantity = Math.max(1, currentQuantity + n); document.getElementById('mod-qty-val').innerText = currentQuantity; }

    function confirmItem() {
        const mods = [];
        let price = currentItem.price;
        for (const gid in currentMods) {
            currentMods[gid].forEach(oid => {
                const o = modOptions.find(x => x.id === oid);
                if (o) { mods.push({ name: o.name }); price += parseFloat(o.price_adjustment || 0); }
            });
        }
        cart.push({ ...currentItem, qty: currentQuantity, mods, finalPrice: price });
        renderCart();
        closeModal();
        saveCartState();
    }

    function renderCart() {
        const container = document.getElementById('cart-items');
        if (!cart.length) { container.innerHTML = '<div class="text-center text-stone-700 mt-20 text-[10px] font-black uppercase tracking-[0.3em]">Carrito Vacío</div>'; document.getElementById('cart-total').innerText = 'L. 0.00'; return; }
        
        container.innerHTML = cart.map((item, i) => `
            <div class="flex justify-between items-start mb-3 p-3 bg-stone-900/40 rounded-xl border border-white/5">
                <div class="flex-1">
                    <p class="text-xs font-black text-gray-200">${item.qty}x ${item.name}</p>
                    <p class="text-[9px] text-stone-500">${item.mods.map(m=>m.name).join(', ')}</p>
                </div>
                <div class="text-right">
                    <p class="text-xs font-black text-gold">L. ${(item.finalPrice * item.qty).toFixed(0)}</p>
                    <button onclick="removeFromCart(${i})" class="text-[8px] text-red-900 uppercase font-black">Remover</button>
                </div>
            </div>
        `).join('');
        
        const total = cart.reduce((s, i) => s + (i.finalPrice * i.qty), 0);
        document.getElementById('cart-total').innerText = `L. ${total.toFixed(2)}`;
    }

    function removeFromCart(i) { cart.splice(i, 1); renderCart(); saveCartState(); }
    function saveCartState() { localStorage.setItem('pos_cart_state', JSON.stringify({ cart, customerId: currentCustomerId })); }
    function restoreCart() { const s = localStorage.getItem('pos_cart_state'); if(s) { const d = JSON.parse(s); cart = d.cart || []; currentCustomerId = d.customerId; renderCart(); } }

    async function fetchLiveOrders() {
        const res = await fetch('/api/orders?v=' + Date.now(), { headers: { 'Authorization': 'Bearer EMP-admin' } });
        const data = await res.json();
        liveOrders = (data.orders || []).filter(o => ['pending', 'paid', 'preparing', 'ready', 'pending_verification'].includes(o.status));
        renderLiveFeed();
        document.getElementById('hb-status').innerText = 'Last sync: ' + new Date().toLocaleTimeString();
    }

    function renderLiveFeed() {
        const container = document.getElementById('live-order-feed');
        document.getElementById('live-order-count').innerText = liveOrders.length;
        container.innerHTML = liveOrders.map(o => {
            const name = o.customers?.name || o.notes?.match(/\[CLIENTE: (.*?)\]/)?.[1] || 'Invitado';
            return `
                <div class="p-3 bg-stone-900 border border-white/5 rounded-xl shadow-lg">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black text-stone-600">#${o.order_number}</span>
                        <span class="text-[8px] font-black uppercase px-2 py-0.5 rounded-full bg-orange-500/10 text-orange-500">${o.status}</span>
                    </div>
                    <p class="text-[11px] font-bold text-gray-300 truncate">${name.toUpperCase()}</p>
                    <div class="flex justify-between items-center mt-2">
                        <span class="text-[9px] font-black text-stone-600 uppercase">${o.payment_method}</span>
                        <button onclick="recallOrder('${o.id}')" class="text-[9px] font-black text-gold uppercase border border-gold/20 px-2 py-1 rounded">Recuperar</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function setFulfillment(t) { 
        fulfillmentType = t;
        ['dinein','pickup'].forEach(x => {
            const b = document.getElementById('btn-fulfill-' + x);
            if(t === x) b.className = "flex-1 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest border-2 border-gold text-gold bg-gold/5 shadow-lg shadow-gold/10";
            else b.className = "flex-1 py-2.5 rounded-xl font-black text-[9px] uppercase tracking-widest border-2 border-stone-700 text-stone-400";
        });
    }

    function openTenderModal() {
        if(!cart.length) return;
        const modal = document.getElementById('tender-modal');
        modal.classList.remove('hidden');
        const total = cart.reduce((s, i) => s + (i.finalPrice * i.qty), 0);
        modal.innerHTML = `
            <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl p-8 overflow-hidden border-t-8 border-gray-900">
                <h3 class="text-xl font-black text-gray-900 text-center mb-6 uppercase tracking-widest">Método de Pago</h3>
                <div class="bg-gray-100 p-4 rounded-2xl mb-8 flex justify-between items-center">
                    <span class="text-gray-400 font-bold">Total:</span>
                    <span class="text-3xl font-black text-gray-900 font-mono">L. ${total.toFixed(2)}</span>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-8">
                    <button onclick="setTender('cash')" class="p-6 border-2 border-green-500 bg-green-50 rounded-2xl flex flex-col items-center gap-2"><i class="fas fa-money-bill-wave text-green-600"></i><span class="text-xs font-black text-green-700 uppercase">Efectivo</span></button>
                    <button onclick="setTender('card')" class="p-6 border-2 border-gray-100 rounded-2xl flex flex-col items-center gap-2 grayscale"><i class="fas fa-credit-card"></i><span class="text-xs font-black text-gray-400 uppercase">Tarjeta</span></button>
                </div>
                <button onclick="processCobrar()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl">Finalizar Venta</button>
                <button onclick="document.getElementById('tender-modal').classList.add('hidden')" class="w-full mt-4 text-xs font-bold text-gray-400">Volver</button>
            </div>
        `;
    }

    function setTender(m) { currentTenderMethod = m; }

    async function processCobrar() {
        const total = cart.reduce((s, i) => s + (i.finalPrice * i.qty), 0);
        const payload = { items: cart, total, payment_method: currentTenderMethod, fulfillment: fulfillmentType, status: 'paid', shift_id: currentShiftId, restaurant_id: 'rich-aroma' };
        const res = await fetch('/api/orders', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if(res.ok) { alert("Venta Exitosa"); cart = []; renderCart(); localStorage.removeItem('pos_cart_state'); document.getElementById('tender-modal').classList.add('hidden'); fetchLiveOrders(); }
        else alert("Error al procesar");
    }

    function closeModal() { document.getElementById('modifier-modal').classList.add('hidden'); }
    async function endShift() { document.getElementById('shift-close-modal').classList.remove('hidden'); }
    function closeShiftModal() { document.getElementById('shift-close-modal').classList.add('hidden'); }
</script>

</body>
</html>
