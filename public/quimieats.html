<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuimiEats | Todo lo que necesitas en Quimistán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        gold: '#C9A66B', 
                        dark: '#0D0D0D', 
                        cyan: '#00F2FF',
                        uber: '#06C167' 
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        body { background-color: #0D0D0D; color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .cat-pill.active { background: #00F2FF; color: #0D0D0D; border-color: #00F2FF; font-weight: 900; }
        .partner-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .partner-card:active { transform: scale(0.98); opacity: 0.8; }
        .text-glow { text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        
        /* SPA Transitions */
        #main-discovery, #menu-view { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease; }
        .view-hidden { display: none; opacity: 0; transform: translateX(50px); }
    </style>
</head>
<body class="min-h-screen pb-20 text-white">

    <!-- VIEW: DISCOVERY (Main Feed) -->
    <div id="main-discovery" class="space-y-0">
        <!-- Header -->
        <header class="px-6 py-6 flex justify-between items-center bg-dark">
            <h1 class="text-3xl font-black italic tracking-tighter">
                QUIMI<span class="text-cyan text-glow">EATS</span>
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="window.location.href='/order'" class="w-10 h-10 rounded-full glass flex items-center justify-center text-gold"><i class="fas fa-user"></i></button>
            </div>
        </header>

        <!-- Location & Search -->
        <div class="px-6 space-y-6 pb-6 bg-dark">
            <div class="flex items-center gap-2 text-cyan">
                <i class="fas fa-location-dot text-sm"></i>
                <span class="text-xs font-black uppercase tracking-widest">Quimistán, Santa Barbara</span>
            </div>
            <div class="relative group">
                <i class="fas fa-search absolute left-6 top-1/2 -translate-y-1/2 text-white/20"></i>
                <input type="text" id="store-search" oninput="handleSearch()" placeholder="¿Qué se te antoja hoy?" class="w-full bg-white/5 border border-white/10 p-5 pl-14 rounded-[2rem] text-white outline-none focus:border-cyan transition-all font-medium">
            </div>
        </div>

        <!-- Ads Carousel -->
        <div class="px-6 mb-8 overflow-hidden">
            <div id="ads-container" class="flex gap-4 overflow-x-auto hide-scrollbar snap-x snap-mandatory">
                <div class="relative min-w-full h-44 rounded-[2.5rem] overflow-hidden group cursor-pointer snap-center" onclick="openStoreMenu('rich-aroma')">
                    <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800&auto=format&fit=crop" class="w-full h-full object-cover brightness-50">
                    <div class="absolute inset-0 p-8 flex flex-col justify-end space-y-1">
                        <p class="text-[10px] font-black text-cyan uppercase tracking-[0.3em]">Destacado</p>
                        <h2 class="text-2xl font-black uppercase tracking-tight">Rich Aroma Coffee</h2>
                        <p class="text-white/60 text-xs font-bold">10% de descuento con Rico Cash</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Categories -->
        <section class="mb-10 overflow-x-auto hide-scrollbar px-6">
            <div class="flex gap-4 min-w-max" id="cat-pills">
                <button onclick="filterCategory('all', this)" class="cat-pill active px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all">
                    <span class="text-2xl">✨</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Todos</span>
                </button>
                <button onclick="filterCategory('restaurante', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all">
                    <span class="text-2xl">🍔</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Comida</span>
                </button>
                <button onclick="filterCategory('reposteria', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all">
                    <span class="text-2xl">☕</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Café</span>
                </button>
                <button onclick="filterCategory('farmacia', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all text-white/40">
                    <span class="text-2xl opacity-40">💊</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Farmacia</span>
                </button>
                <button onclick="filterCategory('supermercado', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all text-white/40">
                    <span class="text-2xl opacity-40">🛒</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Súper</span>
                </button>
                <button onclick="filterCategory('servicios', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all text-white/40">
                    <span class="text-2xl opacity-40">🛠️</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Servicios</span>
                </button>
                <button onclick="filterCategory('belleza', this)" class="cat-pill px-8 py-4 rounded-3xl glass border-white/5 flex flex-col items-center gap-2 transition-all text-white/40">
                    <span class="text-2xl opacity-40">💅</span>
                    <span class="text-[10px] font-black uppercase tracking-widest">Belleza</span>
                </button>
            </div>
        </section>

        <!-- Partners Feed -->
        <main class="px-6 space-y-8 pb-20">
            <div class="flex justify-between items-end mb-2">
                <h3 class="text-xl font-black uppercase tracking-tighter text-white/90">Tiendas Cercanas</h3>
                <p class="text-[10px] font-black text-cyan uppercase tracking-widest animate-pulse">Abierto Ahora</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="partners-container">
                <div class="animate-pulse bg-white/5 h-72 rounded-[2.5rem]"></div>
            </div>
        </main>

        <!-- Footer Info -->
        <section class="mt-20 px-6 pb-20">
            <div class="glass p-10 rounded-[3rem] text-center space-y-6 border border-cyan/10">
                <h4 class="text-xl font-black uppercase tracking-tight">¿Tienes un negocio?</h4>
                <div class="flex flex-col gap-3">
                    <button onclick="document.getElementById('join').scrollIntoView({behavior:'smooth'})" class="bg-cyan text-dark px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] transition-all">Unirse Ahora</button>
                    <a href="/socios" class="text-[9px] font-black text-white/20 uppercase tracking-widest hover:text-cyan">Ver Beneficios <i class="fas fa-arrow-right ml-1"></i></a>
                </div>
            </div>
        </section>

        <!-- Lead Form -->
        <section id="join" class="max-w-4xl mx-auto px-6 py-20">
            <div class="glass p-10 rounded-[3.5rem] space-y-10 border border-cyan/20">
                <div class="text-center space-y-4">
                    <h3 class="text-3xl font-black uppercase tracking-tight">Registro de Socios</h3>
                    <p class="text-white/40 text-xs font-bold uppercase tracking-widest leading-relaxed">Únete a la red comercial más avanzada de la zona</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="lead-restaurant" placeholder="Nombre Comercial" class="w-full bg-white/5 border border-white/10 p-5 rounded-[2rem] text-white outline-none focus:border-cyan text-sm font-bold">
                    <select id="lead-cat" class="w-full bg-white/5 border border-white/10 p-5 rounded-[2rem] text-white/40 outline-none focus:border-cyan text-sm">
                        <option value="restaurante">Restaurante / Comida</option>
                        <option value="reposteria">Repostería / Café</option>
                        <option value="farmacia">Farmacia</option>
                        <option value="supermercado">Supermercado</option>
                    </select>
                    <input type="text" id="lead-contact" placeholder="Tu Nombre" class="w-full bg-white/5 border border-white/10 p-5 rounded-[2rem] text-white outline-none focus:border-cyan text-sm font-bold">
                    <input type="tel" id="lead-phone" placeholder="WhatsApp (9999-9999)" class="w-full bg-white/5 border border-white/10 p-5 rounded-[2rem] text-white outline-none focus:border-cyan text-sm font-bold">
                </div>
                <button onclick="submitLead()" id="submit-btn" class="w-full bg-cyan text-dark py-6 rounded-[2.5rem] font-black uppercase tracking-[0.3em] shadow-[0_0_30px_rgba(0,242,255,0.2)] active:scale-95 transition-all text-xs">Crear mi Tienda Gratis</button>
            </div>
        </section>
    </div>

    <!-- VIEW: STORE MENU (SPA Hidden by default) -->
    <div id="menu-view" class="view-hidden fixed inset-0 bg-dark z-[200] overflow-y-auto">
        <div class="relative h-64 bg-white/5">
            <img id="store-header-img" src="" class="w-full h-full object-cover brightness-50">
            <button onclick="closeStoreMenu()" class="absolute top-8 left-6 w-12 h-12 rounded-full glass flex items-center justify-center text-white shadow-2xl active:scale-90 transition-all">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="absolute bottom-8 left-8 space-y-2">
                <h2 id="store-title" class="text-4xl font-black uppercase tracking-tighter leading-none">---</h2>
                <p id="store-cat" class="text-[10px] text-cyan font-black uppercase tracking-[0.3em]">---</p>
            </div>
        </div>

        <div class="p-6 space-y-10" id="store-menu-content">
            <!-- Loading State -->
            <div class="animate-pulse space-y-4">
                <div class="h-8 bg-white/5 w-1/3 rounded-xl"></div>
                <div class="grid grid-cols-1 gap-4">
                    <div class="h-32 bg-white/5 rounded-[2rem]"></div>
                    <div class="h-32 bg-white/5 rounded-[2rem]"></div>
                </div>
            </div>
        </div>
        
        <!-- Cart Action (Sticky) -->
        <div class="fixed bottom-8 left-8 right-8 z-[300]">
            <button onclick="window.location.href='/order?restaurantId=' + currentStoreId" class="w-full bg-cyan text-dark py-6 rounded-[2.5rem] font-black uppercase tracking-[0.3em] shadow-[0_0_40px_rgba(0,242,255,0.3)] active:scale-95 transition-all flex justify-between px-10">
                <span>Ir al Carrito</span>
                <span id="cart-total-badge">L. 0.00</span>
            </button>
        </div>
    </div>

    <script>
        let allPartners = [];
        let currentStoreId = '';

        window.onload = () => {
            loadPartners();
            loadAds();
        };

        async function loadPartners() {
            try {
                // Fetch the dynamic active businesses (Merged from restaurants + leads)
                const res = await fetch('/api/admin?action=quimieats_active');
                allPartners = await res.json();
                
                // Ensure Rich Aroma stays featured if it's in the list
                const raIndex = allPartners.findIndex(p => p.id === 'rich-aroma');
                if (raIndex > -1) {
                    const ra = allPartners.splice(raIndex, 1)[0];
                    allPartners.unshift(ra);
                }
                
                renderPartners(allPartners);
            } catch (e) { console.error("Load Partners failed", e); }
        }

        async function loadAds() {
            try {
                const res = await fetch('/api/store?action=get_ads');
                const ads = await res.json();
                const container = document.getElementById('ads-container');
                const baseHtml = container.innerHTML;
                const adsHtml = ads.map(ad => `
                    <div class="relative min-w-full h-44 rounded-[2.5rem] overflow-hidden group cursor-pointer snap-center" onclick="window.location.href='${ad.link}'">
                        <img src="${ad.image}" class="w-full h-full object-cover brightness-50">
                        <div class="absolute inset-0 p-8 flex flex-col justify-end space-y-1">
                            <p class="text-[10px] font-black text-cyan uppercase tracking-[0.3em]">${ad.badge}</p>
                            <h2 class="text-2xl font-black uppercase tracking-tight text-white">${ad.title}</h2>
                            <p class="text-white/60 text-xs font-bold">${ad.subtitle}</p>
                        </div>
                    </div>
                `).join('');
                container.innerHTML = baseHtml + adsHtml;
            } catch (e) { console.error("Ads failed", e); }
        }

        function renderPartners(partners) {
            const container = document.getElementById('partners-container');
            if (partners.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-white/20 py-20 uppercase font-black tracking-widest text-[10px]">Sin resultados</p>`;
                return;
            }
            container.innerHTML = partners.map((p, index) => `
                <div class="partner-card rounded-[3rem] overflow-hidden cursor-pointer flex flex-col shadow-xl" onclick="window.location.href='/order?restaurantId=${p.id}'">
                    <div class="relative h-56 bg-white/5 overflow-hidden">
                        <img src="${p.logo_url || '/favicon.png'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark/90 to-transparent"></div>
                        <div class="absolute bottom-6 left-8">
                            <h4 class="text-2xl font-black uppercase tracking-tighter text-white leading-none">${p.name}</h4>
                            <p class="text-[10px] text-cyan font-black uppercase tracking-widest mt-1">${p.category || 'Restaurante'}</p>
                        </div>
                        <div class="absolute top-6 right-6 bg-cyan text-dark text-[10px] font-black px-3 py-1 rounded-full shadow-xl">
                            ${index === 0 ? 'DESTACADO' : 'SOCIO'}
                        </div>
                    </div>
                    <div class="p-8 space-y-4 flex-1 flex flex-col justify-between">
                        <div class="flex items-center gap-6 text-[10px] font-bold text-white/40 uppercase tracking-widest">
                            <span><i class="fas fa-motorcycle text-cyan/60 mr-2"></i>L. 35.00</span>
                            <span><i class="fas fa-clock text-cyan/60 mr-2"></i>15-25 min</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function openStoreMenu(id) {
            currentStoreId = id;
            const partner = allPartners.find(p => p.id === id) || { name: 'Rich Aroma', category: 'Café', logo_url: 'https://images.unsplash.com/photo-1509042239860-f550ce710b93' };
            
            document.getElementById('store-title').innerText = partner.name;
            document.getElementById('store-cat').innerText = partner.category || 'Restaurante';
            document.getElementById('store-header-img').src = partner.logo_url;
            
            const discovery = document.getElementById('main-discovery');
            const menu = document.getElementById('menu-view');
            
            discovery.classList.add('view-hidden');
            menu.classList.remove('view-hidden');
            window.scrollTo(0, 0);

            try {
                const res = await fetch(`/api/menu?restaurantId=${id}`);
                const data = await res.json();
                renderMenu(data.items);
            } catch (e) { console.error("Menu load fail", e); }
        }

        function closeStoreMenu() {
            document.getElementById('main-discovery').classList.remove('view-hidden');
            document.getElementById('menu-view').classList.add('view-hidden');
        }

        function renderMenu(items) {
            const container = document.getElementById('store-menu-content');
            if(!items || items.length === 0) {
                container.innerHTML = `<p class="text-center py-20 text-white/20 uppercase font-black text-xs">Menú no disponible aún</p>`;
                return;
            }

            const categories = {};
            items.forEach(item => {
                let cat = item.category || 'Otros';
                const itemName = (item.name || '').toLowerCase();
                const catLower = cat.toLowerCase();
                
                // Smart Detect Combos for any business
                if (catLower === 'combos' || catLower === 'combo' || catLower.includes('paquete') || itemName.includes('combo') || itemName.includes('paquete')) {
                    cat = 'Combos';
                }
                
                if(!categories[cat]) categories[cat] = [];
                categories[cat].push(item);
            });

            const categoryOrder = ['Combos', 'Comida', 'Café', 'Heladas', 'Postres', 'Menú Secreto', 'Otros'];
            const sortedCats = Object.keys(categories).sort((a, b) => {
                let indexA = categoryOrder.indexOf(a);
                let indexB = categoryOrder.indexOf(b);
                if (indexA === -1) indexA = 99;
                if (indexB === -1) indexB = 99;
                return indexA - indexB;
            });

            container.innerHTML = sortedCats.map(cat => `
                <div class="space-y-6">
                    <h3 class="text-xs font-black uppercase tracking-[0.4em] text-cyan">${cat}</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        ${categories[cat].map(i => `
                            <div class="glass p-5 rounded-[2.5rem] flex gap-5 items-center active:scale-95 transition-all cursor-pointer" onclick="window.location.href='/order?restaurantId=${currentStoreId}'">
                                <div class="w-20 h-20 bg-white/5 rounded-2xl overflow-hidden shrink-0">
                                    <img src="${i.image_url || '/favicon.png'}" class="w-full h-full object-cover">
                                </div>
                                <div class="flex-1 space-y-1">
                                    <h4 class="text-sm font-black uppercase text-white/90 leading-tight">${i.name}</h4>
                                    <p class="text-xs font-mono font-black text-gold">L. ${parseFloat(i.price).toFixed(2)}</p>
                                </div>
                                <div class="w-10 h-10 rounded-full bg-cyan/10 text-cyan flex items-center justify-center">
                                    <i class="fas fa-plus text-xs"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function handleSearch() {
            const term = document.getElementById('store-search').value.toLowerCase();
            const filtered = allPartners.filter(p => p.name.toLowerCase().includes(term) || (p.category || '').toLowerCase().includes(term));
            renderPartners(filtered);
        }

        function filterCategory(cat, btn) {
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            if (cat === 'all') renderPartners(allPartners);
            else renderPartners(allPartners.filter(p => (p.category || '').toLowerCase() === cat));
        }

        async function submitLead() {
            const restaurant_name = document.getElementById('lead-restaurant').value;
            const contact_name = document.getElementById('lead-contact').value;
            const phone = document.getElementById('lead-phone').value;
            const category = document.getElementById('lead-cat').value;
            if (!restaurant_name || !contact_name || !phone) return alert("Completa los campos");
            try {
                const res = await fetch('/api/store?action=quimieats_signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ restaurant_name, contact_name, phone, category })
                });
                const data = await res.json();
                if (res.ok && data.setupUrl) window.location.href = data.setupUrl;
            } catch (e) { alert("Error al crear tienda"); }
        }
    </script>
</body>
</html>
