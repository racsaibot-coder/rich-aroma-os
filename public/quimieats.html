<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuimiEats - Comida a Domicilio en Quimistán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .hero-pattern {
            background-color: #ffffff;
            background-image: radial-gradient(#f3f4f6 2px, transparent 2px);
            background-size: 20px 20px;
        }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-dark font-sans pb-24 max-w-md mx-auto shadow-2xl min-h-screen relative">

    <!-- Promo Ad Banner -->
    <div id="promo-banner" class="hidden h-20 bg-dark relative overflow-hidden">
        <div id="promo-container" class="w-full h-full">
            <!-- Injected Ads -->
        </div>
        <div class="absolute top-1 right-2 bg-black/40 text-white text-[8px] px-1.5 py-0.5 rounded backdrop-blur-sm font-black uppercase tracking-widest">Patrocinado</div>
    </div>

    <!-- Header -->
    <header class="bg-white px-4 pt-4 pb-2 sticky top-0 z-50">
        <div class="max-w-md mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-orange-500 text-white p-2 rounded-lg font-bold text-xl">QE</div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">QuimiEats</h1>
                    <div class="flex items-center text-xs text-gray-500 gap-1 cursor-pointer">
                        <span>📍 Plaza Quimistán</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </div>
            <button class="bg-gray-100 p-2 rounded-full relative">
                <i class="fas fa-shopping-bag"></i>
                <span class="absolute top-0 right-0 bg-red-500 text-white text-xs w-4 h-4 rounded-full flex items-center justify-center">0</span>
            </button>
        </div>
        
    <!-- Search -->
    <div class="px-4 pb-4 bg-white border-b border-gray-100">
        <div class="relative">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" placeholder="¿Qué necesitas en Quimistán?" class="w-full bg-gray-100 py-2.5 pl-10 pr-4 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500">
        </div>
    </div>

    <!-- Hubs Grid -->
    <div class="p-4 grid grid-cols-4 gap-4 mb-2">
        <!-- Mandados & Comida -->
        <div onclick="filterRestaurants('comida')" class="col-span-2 bg-orange-50 p-4 rounded-2xl flex flex-col justify-between h-32 cursor-pointer border border-orange-100 shadow-sm active:scale-95 transition-all">
            <div class="text-2xl">🍔</div>
            <div>
                <span class="block font-black text-orange-800 text-sm uppercase leading-none">Mandados</span>
                <span class="text-[10px] text-orange-600 font-bold uppercase tracking-widest">Y Comida</span>
            </div>
        </div>
        
        <!-- Salud -->
        <div onclick="filterRestaurants('salud')" class="bg-blue-50 p-3 rounded-2xl flex flex-col justify-between h-32 cursor-pointer border border-blue-100 shadow-sm active:scale-95 transition-all">
            <div class="text-2xl">🩺</div>
            <div>
                <span class="block font-black text-blue-800 text-sm uppercase leading-none">Salud</span>
                <span class="text-[9px] text-blue-600 font-bold uppercase tracking-tight">Médicos</span>
            </div>
        </div>

        <!-- Técnicos -->
        <div onclick="filterRestaurants('servicio')" class="bg-yellow-50 p-3 rounded-2xl flex flex-col justify-between h-32 cursor-pointer border border-yellow-100 shadow-sm active:scale-95 transition-all">
            <div class="text-2xl">🛠️</div>
            <div>
                <span class="block font-black text-yellow-800 text-sm uppercase leading-none">Técnicos</span>
                <span class="text-[9px] text-yellow-600 font-bold uppercase tracking-tight">Reparaciones</span>
            </div>
        </div>

        <!-- Sub-Categories Row -->
        <div onclick="filterRestaurants('super')" class="bg-green-50 p-3 rounded-2xl flex items-center gap-3 cursor-pointer border border-green-100 shadow-sm active:scale-95 transition-all col-span-2">
            <span class="text-xl">🛒</span>
            <span class="font-bold text-green-800 text-xs uppercase tracking-widest">Supermercado</span>
        </div>

        <div onclick="filterRestaurants('abogado')" class="bg-gray-100 p-3 rounded-2xl flex items-center gap-3 cursor-pointer border border-gray-200 shadow-sm active:scale-95 transition-all col-span-2">
            <span class="text-xl">⚖️</span>
            <span class="font-bold text-gray-800 text-xs uppercase tracking-widest">Legal / Abogado</span>
        </div>
    </div>

    <!-- Quick Quick Filters -->
    <div class="flex gap-2 overflow-x-auto px-4 py-2 scroll-hide mb-4">
        <button onclick="filterRestaurants(null)" class="shrink-0 px-4 py-1.5 rounded-full bg-dark text-white text-[10px] font-black uppercase tracking-widest">Todos</button>
        <button onclick="filterRestaurants('farmacia')" class="shrink-0 px-4 py-1.5 rounded-full bg-white border border-gray-200 text-gray-500 text-[10px] font-black uppercase tracking-widest">💊 Farmacias</button>
        <button onclick="filterRestaurants('dentista')" class="shrink-0 px-4 py-1.5 rounded-full bg-white border border-gray-200 text-gray-500 text-[10px] font-black uppercase tracking-widest">🦷 Dentistas</button>
        <button onclick="filterRestaurants('casero')" class="shrink-0 px-4 py-1.5 rounded-full bg-white border border-gray-200 text-gray-500 text-[10px] font-black uppercase tracking-widest">🏠 Comida Casera</button>
        <button onclick="filterRestaurants('ac')" class="shrink-0 px-4 py-1.5 rounded-full bg-white border border-gray-200 text-gray-500 text-[10px] font-black uppercase tracking-widest">❄️ Aire Acond.</button>
    </div>

    <!-- Featured (Rich Aroma) -->
    <section class="px-4 mb-6" id="featured-section">
        <!-- Injected via JS -->
    </section>

    <!-- Popular Near You -->
    <section class="px-4">
        <h2 class="font-bold text-lg mb-3" id="list-title">Recomendados en Quimistán 🇭🇳</h2>
        
        <div class="space-y-4" id="restaurant-list">
            <div class="p-8 text-center text-gray-400 italic">Cargando servicios...</div>
        </div>
    </section>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around py-3 text-gray-400 z-50 max-w-md mx-auto left-0 right-0 shadow-2xl">
        <button onclick="closeStoreMenu()" class="flex flex-col items-center text-orange-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] font-bold">Inicio</span>
        </button>
        <button class="flex flex-col items-center hover:text-orange-500">
            <i class="fas fa-search text-xl"></i>
            <span class="text-[10px] font-bold">Explorar</span>
        </button>
        <button class="flex flex-col items-center hover:text-orange-500">
            <i class="fas fa-receipt text-xl"></i>
            <span class="text-[10px] font-bold">Pedidos</span>
        </button>
        <button class="flex flex-col items-center hover:text-orange-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] font-bold">Mi Cuenta</span>
        </button>
    </nav>

    <!-- IN-APP MENU OVERLAY -->
    <div id="store-menu-view" class="hidden fixed inset-0 z-[100] bg-dark flex flex-col animate-in slide-in-from-bottom duration-300 max-w-md mx-auto">
        <!-- Header -->
        <div class="p-6 flex justify-between items-center bg-dark/80 backdrop-blur-md border-b border-white/5 sticky top-0 z-10">
            <div class="flex items-center gap-4">
                <button onclick="closeStoreMenu()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-white">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div>
                    <h3 id="menu-res-name" class="font-black text-xl text-white uppercase tracking-tighter leading-none">Negocio</h3>
                    <p id="menu-res-cat" class="text-[8px] text-white/30 font-black uppercase tracking-widest mt-1">Categoría</p>
                </div>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 overflow-hidden">
                <img id="menu-res-logo" src="" class="w-full h-full object-cover">
            </div>
        </div>

        <!-- Menu Content -->
        <div class="flex-1 overflow-y-auto p-6 space-y-8 no-scrollbar pb-32" id="menu-items-container">
            <!-- Items injected here -->
        </div>

        <!-- Float Cart (Simple for now) -->
        <div id="menu-cart-btn" class="hidden fixed bottom-10 left-1/2 -translate-x-1/2 w-[85%] max-w-[320px] bg-orange-500 text-white py-4 rounded-[2rem] font-black text-center shadow-2xl animate-bounce">
            REVISAR PEDIDO
        </div>
    </div>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { dark: '#0D0D0D' }
                }
            }
        }

        let allRestaurants = [];

        async function loadRestaurants() {
            try {
                const res = await fetch('/api/admin?action=quimieats_active');
                const data = await res.json();

                // --- ELITE LOGO SHIELD ---
                const eliteLogos = {
                   'fradas-bar--grill-445': 'https://zcqubacfcettwawcimsy.supabase.co/storage/v1/object/public/menu-images/uploads/1780064261851_f3fc0c2b-67ad-4797-9151-31a65f1a119e.JPG',
                   'tonys-pizza': 'https://zcqubacfcettwawcimsy.supabase.co/storage/v1/object/public/menu-images/uploads/1780112315980_tonys_pizza_logo.jpg',
                   'rich-aroma': 'https://zcqubacfcettwawcimsy.supabase.co/storage/v1/object/public/menu-images/uploads/1780064113444_Copy_of_Copy_of_Menu_2025_-_2_512_x_512_px.png',
                   'el-meson': 'https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=800&auto=format&fit=crop'
                };
                allRestaurants = (data || []).map(r => ({
                   ...r,
                   logo_url: eliteLogos[r.id] || r.logo_url
                }));

                filterRestaurants(null);
            } catch (e) {

                console.error("Failed to load restaurants", e);
                document.getElementById('restaurant-list').innerHTML = '<div class="p-8 text-center text-red-500">Error al cargar servicios.</div>';
            }
        }

        function filterRestaurants(category) {
            const featuredSection = document.getElementById('featured-section');
            const listSection = document.getElementById('restaurant-list');
            const listTitle = document.getElementById('list-title');
            
            let filtered = allRestaurants;
            if (category) {
                const search = category.toLowerCase();
                filtered = allRestaurants.filter(r => {
                    const cat = (r.category || '').toLowerCase();
                    const name = (r.name || '').toLowerCase();

                    // Hub logic
                    if (search === 'comida') return cat.includes('comida') || cat.includes('restaurante') || cat.includes('reposteria') || cat.includes('cafe');
                    if (search === 'salud') return cat.includes('médico') || cat.includes('dentista') || cat.includes('farmacia') || cat.includes('clínica');
                    if (search === 'servicio') return cat.includes('técnico') || cat.includes('ac') || cat.includes('eléctrico') || cat.includes('reparación');

                    return cat.includes(search) || name.includes(search);
                });
            }

            // --- PIN FRADAS TO TOP ---
            filtered.sort((a, b) => {
                if (a.name.toLowerCase().includes('fradas')) return -1;
                if (b.name.toLowerCase().includes('fradas')) return 1;
                return 0;
            });

            if (filtered.length === 0) {
                featuredSection.innerHTML = '';
                listSection.innerHTML = `<div class="p-12 text-center text-gray-400 italic">No hay ${category || 'negocios'} disponibles en esta categoría todavía. 🇭🇳</div>`;
                return;
            }

            if (!category) {
                listTitle.innerText = "Recomendados en Quimistán 🇭🇳";
                renderFeatured(filtered[0]);
                renderList(filtered.slice(1));
            } else {
                listTitle.innerText = `Resultados: ${category}`;
                featuredSection.innerHTML = '';
                renderList(filtered);
            }
        }

        function isProfessionalService(r) {
            const cat = (r.category || '').toLowerCase();
            return cat.includes('médico') || cat.includes('dentista') || cat.includes('abogado') || cat.includes('clínica') || cat.includes('ac') || cat.includes('eléctrico');
        }

        function renderFeatured(r) {
            const container = document.getElementById('featured-section');
            const isService = isProfessionalService(r);

            container.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <h2 class="font-black uppercase tracking-tighter text-lg">Destacado 🔥</h2>
                </div>
                <div onclick="openStore('${r.id}')" class="bg-white rounded-[2rem] shadow-xl overflow-hidden cursor-pointer border border-gray-100">
                    <div class="h-44 bg-gray-900 relative">
                        ${r.logo_url ? `<img src="${r.logo_url}" class="w-full h-full object-cover opacity-80">` : `
                            <div class="absolute inset-0 flex items-center justify-center text-white opacity-20 text-7xl">🏙️</div>
                        `}
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl">
                            ${isService ? 'Abierto' : '15-25 min'}
                        </div>
                        <div class="absolute bottom-4 left-4 ${isService ? 'bg-blue-600' : 'bg-orange-500'} text-white px-3 py-1.5 rounded-xl text-[10px] font-black uppercase tracking-widest">
                            ${isService ? 'Ver Perfil' : 'Envío Gratis'}
                        </div>
                    </div>
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-black text-xl uppercase tracking-tighter">${r.name}</h3>
                            <div class="bg-green-50 text-green-700 px-2 py-1 rounded-lg text-xs font-black flex items-center gap-1">
                                4.9 <i class="fas fa-star text-[10px]"></i>
                            </div>
                        </div>
                        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">${r.category || 'Servicio'} • Quimistán Centro</p>
                    </div>
                </div>
            `;
        }

        function renderList(list) {
            const container = document.getElementById('restaurant-list');
            container.innerHTML = list.map(r => {
                const isService = isProfessionalService(r);
                return `
                <div onclick="openStore('${r.id}')" class="flex gap-4 bg-white p-4 rounded-[2rem] shadow-sm cursor-pointer hover:shadow-md transition-all border border-gray-50 active:scale-[0.98]">
                    <div class="w-20 h-20 bg-gray-50 rounded-2xl flex items-center justify-center text-3xl flex-shrink-0 relative overflow-hidden border border-gray-100">
                        ${r.logo_url ? `<img src="${r.logo_url}" class="w-full h-full object-cover">` : '<i class="fas fa-store text-gray-200"></i>'}
                    </div>
                    <div class="flex flex-col justify-center flex-1">
                        <div class="flex justify-between items-start">
                            <h3 class="font-black text-sm uppercase tracking-tight text-gray-800">${r.name}</h3>
                            <div class="text-[10px] font-black flex items-center gap-1 text-orange-400">
                                <i class="fas fa-star"></i> 4.8
                            </div>
                        </div>
                        <p class="text-gray-400 text-[9px] font-bold uppercase tracking-widest mb-2">${r.category || 'Servicio'}</p>
                        <div class="flex gap-3 text-[9px] font-black uppercase tracking-widest">
                            <span class="flex items-center gap-1 text-green-600">
                                <i class="fas fa-circle text-[6px]"></i> ${isService ? 'Disponible' : 'Cocinando'}
                            </span>
                            <span class="flex items-center gap-1 text-gray-400">
                                <i class="${isService ? 'fas fa-calendar-check' : 'fas fa-motorcycle'}"></i> 
                                ${isService ? 'Cita Previa' : 'Envío L. 30'}
                            </span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function openStore(id) {
            const r = allRestaurants.find(x => x.id === id);
            if (!r) return;

            document.getElementById('menu-res-name').innerText = r.name;
            document.getElementById('menu-res-cat').innerText = r.category || 'RESTAURANTE';
            document.getElementById('menu-res-logo').src = r.logo_url || 'https://via.placeholder.com/100';
            
            document.getElementById('store-menu-view').classList.remove('hidden');
            fetchMenu(id);
        }

        function closeStoreMenu() {
            document.getElementById('store-menu-view').classList.add('hidden');
        }

        async function fetchMenu(resId) {
            const container = document.getElementById('menu-items-container');
            container.innerHTML = '<div class="p-20 text-center text-white/10 italic">Cargando menú...</div>';
            
            // --- ID TRANSLATION LAYER ---
            let targetId = resId;
            const idMap = {
                'fradas': 'fradas-bar--grill-445',
                'tony': 'tonys-pizza',
                'tonny': 'tonys-pizza',
                'cerca': 'tonys-pizza',
                'meson': 'el-meson'
            };
            
            Object.keys(idMap).forEach(key => {
                if (targetId.toLowerCase().includes(key)) targetId = idMap[key];
            });

            try {
                // Point to NEW strictly isolated menu API
                const v = Date.now();
                const res = await fetch(`/api/v2-menu?id=${targetId}&v=${v}`);
                const data = await res.json();
                
                if (data.categories && Object.keys(data.categories).length > 0) {
                    renderInAppMenu(data.categories, resId);
                } else {
                    container.innerHTML = `
                        <div class="p-20 text-center space-y-4">
                            <div class="text-4xl">🥐</div>
                            <p class="text-white/30 font-black uppercase text-[10px] tracking-widest">Menú no disponible aún</p>
                            <a href="https://wa.me/50499990000" class="inline-block bg-white/5 text-white px-6 py-3 rounded-xl font-bold text-[10px]">Contactar por WhatsApp</a>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }

        function renderInAppMenu(categories, resId) {
            const container = document.getElementById('menu-items-container');
            let html = "";

            if (!Array.isArray(categories)) {
                console.error("Categories is not an array:", categories);
                return;
            }

            categories.forEach(cat => {
                const items = cat.items || [];
                if (items.length === 0) return;

                html += `
                    <div class="space-y-4">
                        <h4 class="text-cyan-400 font-black uppercase tracking-widest text-[9px] border-b border-cyan-400/20 pb-2">${cat.name}</h4>
                        <div class="grid grid-cols-1 gap-4">
                            ${items.map(item => `
                                <div onclick="window.location.href='/order?restaurantId=${resId}'" class="flex gap-4 bg-white/5 p-4 rounded-[2rem] border border-white/5 active:scale-95 transition-all">
                                    <div class="w-20 h-20 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center overflow-hidden shrink-0">
                                        ${item.image_url && !item.image_url.startsWith('data:') ? `<img src="${item.image_url}" class="w-full h-full object-cover">` : `<span class="text-white/10 font-black text-xl">QE</span>`}
                                    </div>
                                    <div class="flex flex-col justify-center flex-1">
                                        <h5 class="font-black text-white/90 text-[11px] uppercase tracking-tight">${item.name}</h5>
                                        <p class="text-orange-500 font-black text-xs mt-1">L. ${parseFloat(item.price).toFixed(0)}</p>
                                    </div>
                                    <div class="flex items-center">
                                        <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center text-white text-[10px]"><i class="fas fa-plus"></i></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        // --- PROMO AD LOGIC ---
        let activePromos = [];
        let currentPromoIdx = 0;

        async function loadPromos() {
            try {
                const res = await fetch('/api/promos?action=active');
                activePromos = await res.json();
                if (activePromos.length > 0) {
                    document.getElementById('promo-banner').classList.remove('hidden');
                    rotatePromos();
                    setInterval(rotatePromos, 15000); // Rotate every 15s
                }
            } catch (e) { console.error("Ads failed to load"); }
        }

        function rotatePromos() {
            if (activePromos.length === 0) return;
            const promo = activePromos[currentPromoIdx];
            const container = document.getElementById('promo-container');
            
            // Track Impression
            fetch('/api/promos?action=track_impression', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ promo_id: promo.id })
            });

            const isVideo = promo.media_url.includes('.mp4') || promo.media_url.includes('youtube');
            
            if (isVideo) {
                container.innerHTML = `<video src="${promo.media_url}" autoplay muted loop class="w-full h-full object-cover"></video>`;
            } else {
                container.innerHTML = `<img src="${promo.media_url}" class="w-full h-full object-cover animate-in fade-in zoom-in duration-1000">`;
            }

            currentPromoIdx = (currentPromoIdx + 1) % activePromos.length;
        }

        loadRestaurants();
        loadPromos();
    </script>
</body>
</html>
