<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | Tracking Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A66B',
                        dark: '#120C09',
                        success: '#10B981',
                        error: '#EF4444'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #120C09; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        @keyframes bounce-in { 0% { transform: scale(0.5); opacity: 0; } 70% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <!-- SIMULATOR CONTROLS -->
    <div class="w-full max-w-md bg-white/10 p-6 rounded-3xl border border-white/10 mb-8 space-y-4">
        <h3 class="text-center text-xs font-black uppercase tracking-[0.3em] text-gold">KDS Simulator Panel</h3>
        <div class="grid grid-cols-2 gap-2">
            <button onclick="simulate('pending')" class="bg-gray-700 p-3 rounded-xl text-[10px] font-bold uppercase">1. Recibida</button>
            <button onclick="simulate('cash_pending')" class="bg-blue-900/40 p-3 rounded-xl text-[10px] font-bold uppercase border border-blue-500/30">1b. Pago en Caja</button>
            <button onclick="simulate('preparing')" class="bg-orange-600 p-3 rounded-xl text-[10px] font-bold uppercase">2. Cocina (50%)</button>
            <button onclick="simulate('ready')" class="bg-gold p-3 rounded-xl text-dark text-[10px] font-bold uppercase">3. Lista (100%)</button>
            <button onclick="simulate('shipped')" class="bg-blue-600 p-3 rounded-xl text-[10px] font-bold uppercase col-span-2">4. En Camino 🛵</button>
        </div>
        <p class="text-[8px] text-center text-white/20 uppercase tracking-widest">Click a button to change the customer's view below</p>
    </div>

    <!-- CUSTOMER VIEW (MIRROR OF ORDER.HTML) -->
    <div id="track-modal" class="w-full max-w-sm flex flex-col items-center text-center p-4">
        <div id="track-icon" class="w-20 h-20 bg-success/20 text-success rounded-full flex items-center justify-center text-3xl mb-8 animate-bounce-in"><i class="fas fa-check"></i></div>
        <h2 class="text-3xl font-black text-white mb-2 italic tracking-tight uppercase">¡ORDEN RECIBIDA!</h2>
        <p id="track-msg" class="text-white/40 text-sm mb-6 max-w-xs leading-relaxed">Tu pedido ha sido enviado. Prepárate para el mejor sabor.</p>

        <!-- STATUS PROGRESS BAR -->
        <div class="w-full max-w-xs flex items-center justify-between mb-8 px-4 relative">
            <div class="absolute left-10 right-10 h-0.5 bg-white/5 top-1/2 -translate-y-1/2 z-0"></div>
            <div id="track-progress-line" class="absolute left-10 h-0.5 bg-gold top-1/2 -translate-y-1/2 z-0 transition-all duration-1000" style="width: 0%"></div>
            
            <div class="relative z-10 flex flex-col items-center gap-2">
                <div id="step-1" class="w-6 h-6 rounded-full bg-gold text-dark flex items-center justify-center text-[10px] font-black shadow-lg shadow-gold/20"><i class="fas fa-check"></i></div>
                <span class="text-[7px] font-black text-gold uppercase tracking-widest">Recibida</span>
            </div>
            <div id="step-2" class="relative z-10 flex flex-col items-center gap-2">
                <div class="w-6 h-6 rounded-full bg-white/5 text-white/20 flex items-center justify-center text-[10px] font-black border border-white/10 transition-all duration-500"><i class="fas fa-fire-alt"></i></div>
                <span class="text-[7px] font-black text-white/20 uppercase tracking-widest">Cocina</span>
            </div>
            <div id="step-3" class="relative z-10 flex flex-col items-center gap-2">
                <div class="w-6 h-6 rounded-full bg-white/5 text-white/20 flex items-center justify-center text-[10px] font-black border border-white/10 transition-all duration-500"><i class="fas fa-mug-hot"></i></div>
                <span class="text-[7px] font-black text-white/20 uppercase tracking-widest">Lista</span>
            </div>
            <div id="step-delivery-ui" class="hidden relative z-10 flex flex-col items-center gap-2">
                <div id="step-4" class="w-6 h-6 rounded-full bg-white/5 text-white/20 flex items-center justify-center text-[10px] font-black border border-white/10 transition-all duration-500"><i class="fas fa-motorcycle"></i></div>
                <span class="text-[7px] font-black text-white/20 uppercase tracking-widest">En Camino</span>
            </div>
        </div>

        <div class="glass w-full p-8 rounded-[3rem] space-y-6 relative mb-8 overflow-hidden">
            <div class="flex justify-between items-center">
                <div class="text-left"><p class="text-[10px] font-black text-gold uppercase tracking-[0.4em] mb-1">Orden</p><h3 class="text-4xl font-black text-white tracking-tighter">#TEST</h3></div>
                <div class="bg-white p-2 rounded-xl inline-block shadow-2xl"><i class="fas fa-qrcode text-dark text-4xl"></i></div>
            </div>
            <div class="flex justify-center">
                <div id="status-badge" class="bg-white/5 border border-white/10 px-4 py-2 rounded-full text-[10px] font-black text-white uppercase tracking-[0.2em]">RECIBIDA</div>
            </div>
            <p class="text-[9px] text-white/30 font-black uppercase tracking-widest leading-relaxed">Muestra este código en caja para identificar tu pago.</p>
        </div>
    </div>

    <!-- Audio Simulator -->
    <audio id="chime-prep" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>
    <audio id="chime-ready" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
    <audio id="chime-shipped" src="https://assets.mixkit.co/active_storage/sfx/1003/1003-preview.mp3"></audio>

    <script>
        function simulate(status) {
            const title = document.querySelector('#track-modal h2');
            const msg = document.getElementById('track-msg');
            const icon = document.getElementById('track-icon');
            const progress = document.getElementById('track-progress-line');
            const badge = document.getElementById('status-badge');
            const deliveryUI = document.getElementById('step-delivery-ui');

            // Reset classes
            [2,3,4].forEach(n => {
                const el = document.querySelector(`#step-${n} div`);
                if(el) el.className = "w-6 h-6 rounded-full bg-white/5 text-white/20 flex items-center justify-center text-[10px] font-black border border-white/10 transition-all duration-500";
            });

            if (status === 'pending') {
                title.innerText = "¡ORDEN RECIBIDA! ✅";
                msg.innerText = "Tu pedido ha sido enviado. Prepárate para el mejor sabor.";
                progress.style.width = "0%";
                badge.innerText = "RECIBIDA";
                icon.innerHTML = '<i class="fas fa-check"></i>';
                icon.className = "w-20 h-20 bg-success/20 text-success rounded-full flex items-center justify-center text-3xl mb-8 animate-bounce-in";
                deliveryUI.classList.add('hidden');
            }

            if (status === 'cash_pending') {
                title.innerText = "¡ORDEN RECIBIDA! ✅";
                msg.innerText = "Orden recibida. Favor proceder a caja para realizar tu pago.";
                progress.style.width = "0%";
                badge.innerText = "PAGO PENDIENTE";
                icon.innerHTML = '<i class="fas fa-wallet"></i>';
                icon.className = "w-20 h-20 bg-blue-500/20 text-blue-400 rounded-full flex items-center justify-center text-3xl mb-8 animate-pulse";
                deliveryUI.classList.add('hidden');
            }

            if (status === 'preparing') {
                document.getElementById('chime-prep').play();
                title.innerText = "PREPARANDO... 🔥";
                msg.innerText = "Estamos preparando tu pedido con mucho amor. Casi listo...";
                progress.style.width = "50%";
                badge.innerText = "EN COCINA";
                icon.innerHTML = '<i class="fas fa-fire-alt"></i>';
                icon.className = "w-20 h-20 bg-orange-500/20 text-orange-500 rounded-full flex items-center justify-center text-3xl mb-8 animate-pulse";
                document.querySelector('#step-2 div').className = "w-6 h-6 rounded-full bg-orange-500 text-white flex items-center justify-center text-[10px] font-black shadow-lg animate-pulse";
            }

            if (status === 'ready') {
                document.getElementById('chime-ready').play();
                title.innerText = "¡ORDEN LISTA! ☕";
                msg.innerText = "Tu pedido está listo para ser retirado en barra. ¡Que lo disfrutes!";
                progress.style.width = "100%";
                badge.innerText = "LISTA PARA RETIRAR";
                icon.innerHTML = '<i class="fas fa-mug-hot"></i>';
                icon.className = "w-20 h-20 bg-gold/20 text-gold rounded-full flex items-center justify-center text-3xl mb-8 animate-bounce-in";
                document.querySelector('#step-2 div').className = "w-6 h-6 rounded-full bg-gold text-dark flex items-center justify-center text-[10px] font-black shadow-lg";
                document.querySelector('#step-3 div').className = "w-6 h-6 rounded-full bg-gold text-dark flex items-center justify-center text-[10px] font-black shadow-lg animate-bounce";
            }

            if (status === 'shipped') {
                document.getElementById('chime-shipped').play();
                deliveryUI.classList.remove('hidden');
                title.innerText = "¡EN CAMINO! 🛵";
                msg.innerText = "Tu pedido ya salió de nuestra tienda y va en camino a tu ubicación.";
                progress.style.width = "75%";
                badge.innerText = "EN CAMINO";
                icon.innerHTML = '<i class="fas fa-motorcycle"></i>';
                icon.className = "w-20 h-20 bg-blue-500/20 text-blue-500 rounded-full flex items-center justify-center text-3xl mb-8 animate-bounce";
                document.querySelector('#step-2 div').className = "w-6 h-6 rounded-full bg-gold text-dark flex items-center justify-center text-[10px] font-black shadow-lg";
                document.querySelector('#step-3 div').className = "w-6 h-6 rounded-full bg-gold text-dark flex items-center justify-center text-[10px] font-black shadow-lg";
                document.querySelector('#step-4 div').className = "w-6 h-6 rounded-full bg-blue-500 text-white flex items-center justify-center text-[10px] font-black shadow-lg animate-bounce";
            }
        }
    </script>
</body>
</html>
