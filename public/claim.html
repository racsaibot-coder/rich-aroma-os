<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | Reclamar Pedido</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { gold: '#C9A66B', dark: '#120C09' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #120C09; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px border-white/10; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-center">

    <div id="main-content" class="w-full max-w-sm space-y-8 animate-in fade-in zoom-in duration-500">
        <div class="w-20 h-20 bg-gold/10 text-gold rounded-[2rem] flex items-center justify-center mx-auto border border-gold/20 shadow-2xl">
            <i class="fas fa-motorcycle text-3xl"></i>
        </div>

        <div id="order-preview" class="space-y-2">
            <h1 class="text-3xl font-black uppercase tracking-tighter">Nuevo Pedido</h1>
            <p id="order-id-label" class="text-white/40 font-bold text-xs uppercase tracking-widest">---</p>
            
            <div id="order-items" class="glass p-6 rounded-[2.5rem] mt-6 text-left space-y-3">
                <p class="text-center text-white/20 italic text-sm">Cargando detalles...</p>
            </div>
        </div>

        <!-- Driver PIN Input -->
        <div id="login-section" class="space-y-6">
            <div class="space-y-2">
                <input type="password" id="driver-pin" maxlength="4" inputmode="numeric" class="w-full bg-transparent border-b-4 border-white/10 text-center text-6xl font-black text-gold outline-none tracking-[0.5em] py-4 focus:border-gold" placeholder="****">
                <p class="text-[9px] text-white/20 uppercase font-black tracking-widest">Ingrese su PIN de Repartidor</p>
            </div>

            <button onclick="claimOrder()" id="claim-btn" class="w-full bg-gold text-dark py-5 rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-all">
                RECLAMAR AHORA
            </button>
        </div>

        <div id="success-screen" class="hidden space-y-6">
            <div class="text-5xl">✅</div>
            <h2 class="text-2xl font-black uppercase tracking-tight text-success">¡RECLAMADO!</h2>
            <div id="delivery-info" class="glass p-6 rounded-[2.5rem] text-left space-y-4">
                <!-- Customer Name, Phone, Address -->
            </div>
            <button onclick="window.location.href='/os'" class="w-full bg-white/5 py-4 rounded-2xl text-xs font-black uppercase tracking-widest border border-white/10">Ir a mi Panel</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');

        window.onload = async () => {
            if (!orderId) {
                document.body.innerHTML = "<h1>Enlace Inválido</h1>";
                return;
            }
            document.getElementById('order-id-label').innerText = orderId;
            fetchOrderDetails();
        };

        async function fetchOrderDetails() {
            try {
                // We use orders-v2 or similar if available, or store?action=order
                const res = await fetch(`/api/store?action=order&id=${orderId}`);
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);

                const container = document.getElementById('order-items');
                container.innerHTML = (data.items || []).map(i => `
                    <div class="flex justify-between items-center text-sm font-bold">
                        <span class="text-white/80">${i.qty || 1}x ${i.name}</span>
                        <span class="text-gold font-mono">L. ${i.price}</span>
                    </div>
                `).join('');
                
                if (data.notes) {
                    container.innerHTML += `<div class="mt-4 pt-4 border-t border-white/5 text-[10px] text-white/40 italic">${data.notes}</div>`;
                }

            } catch (e) {
                console.error(e);
                document.getElementById('order-items').innerHTML = `<p class="text-center text-red-500 font-bold">No se pudo cargar la orden.</p>`;
            }
        }

        async function claimOrder() {
            const pin = document.getElementById('driver-pin').value;
            if (pin.length !== 4) return;

            const btn = document.getElementById('claim-btn');
            btn.innerText = "PROCESANDO...";
            btn.disabled = true;

            try {
                // 1. Driver Login
                const loginRes = await fetch('/api/driver/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ pin })
                });
                const loginData = await loginRes.json();
                if (!loginRes.ok) throw new Error(loginData.error);

                // 2. Claim Order
                const claimRes = await fetch(`/api/driver/orders/${orderId}/claim`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ driverId: loginData.driver.id })
                });
                const claimData = await claimRes.json();
                if (!claimRes.ok) throw new Error(claimData.error);

                // 3. Show Success
                document.getElementById('order-preview').classList.add('hidden');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');

                // Get customer info for delivery
                const { data: order } = await fetch(`/api/store?action=order&id=${orderId}`).then(r => r.json());
                const info = document.getElementById('delivery-info');
                info.innerHTML = `
                    <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Cliente</p>
                        <p class="text-lg font-black text-gold">${order.customers?.name || 'Invitado'}</p>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Teléfono</p>
                        <p class="text-sm font-bold text-white">${order.customers?.phone || '---'}</p>
                    </div>
                    <div>
                        <p class="text-[8px] font-black text-white/20 uppercase tracking-widest">Destino</p>
                        <p class="text-sm font-bold text-white leading-relaxed">${order.notes || 'Ver en mapa'}</p>
                    </div>
                `;

            } catch (err) {
                alert(err.message);
                btn.innerText = "RECLAMAR AHORA";
                btn.disabled = false;
                document.getElementById('driver-pin').value = '';
            }
        }
    </script>
</body>
</html>
