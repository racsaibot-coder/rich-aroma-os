<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Rich Aroma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let selectedTopupAmount = 0;
        let selectedTopupBonus = 0;

        function openTopupModal() {
            document.getElementById('topup-modal').classList.remove('hidden');
            document.getElementById('topup-step-1').classList.remove('hidden');
            document.getElementById('topup-step-2').classList.add('hidden');
            const statusDiv = document.getElementById('topup-status');
            statusDiv.classList.add('hidden');
            statusDiv.innerText = "";
            document.getElementById('topup-receipt-upload').classList.remove('hidden');
            document.getElementById('topup-receipt-upload').value = '';
        }

        function closeTopupModal() {
            document.getElementById('topup-modal').classList.add('hidden');
        }

        function selectTopup(amount, bonus) {
            selectedTopupAmount = amount;
            selectedTopupBonus = bonus;
            
            document.getElementById('topup-transfer-amount').innerText = amount;
            document.getElementById('topup-receive-amount').innerText = amount + bonus;
            
            document.getElementById('topup-step-1').classList.add('hidden');
            document.getElementById('topup-step-2').classList.remove('hidden');
        }

        function backToTopupStep1() {
            document.getElementById('topup-step-1').classList.remove('hidden');
            document.getElementById('topup-step-2').classList.add('hidden');
        }

        function copyBankInfo(bank) {
            let account = '';
            if (bank === 'bac') account = '756132311'; 
            if (bank === 'banpais') account = '210850188679';
            
            navigator.clipboard.writeText(account).then(() => {
                alert(`¡Cuenta de ${bank.toUpperCase()} (${account}) copiada!`);
            }).catch(err => {
                alert(`El número de cuenta es: ${account}`);
            });
        }

        async function submitTopup() {
            const input = document.getElementById('topup-receipt-upload');
            const statusDiv = document.getElementById('topup-status');
            const phone = localStorage.getItem('ra_customer_phone');
            
            if (!input.files || input.files.length === 0) return;
            if (!phone) {
                alert("Por favor inicia sesión primero.");
                return;
            }
            
            statusDiv.classList.remove('hidden');
            statusDiv.innerText = "Enviando comprobante... por favor espera.";
            statusDiv.className = "mt-4 text-sm text-center text-gold font-bold";
            
            const file = input.files[0];
            const reader = new FileReader();
            
            reader.onloadend = async () => {
                const base64String = reader.result;
                try {
                    const res = await fetch('/api/topup', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            phone: phone,
                            amount: selectedTopupAmount,
                            bonus: selectedTopupBonus,
                            imageBase64: base64String,
                            fileName: file.name
                        })
                    });
                    
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || "API Error");
                    
                    statusDiv.innerText = "¡Recarga enviada! El cajero la aprobará en breve. Tu saldo se actualizará automáticamente.";
                    statusDiv.className = "mt-4 text-sm text-center text-green-400 font-bold";
                    input.classList.add('hidden'); 
                    
                    setTimeout(() => {
                        closeTopupModal();
                        location.reload(); // Refresh to show pending or updated balance
                    }, 4000);
                } catch (e) {
                    console.error(e);
                    statusDiv.innerText = `Error: ${e.message}`;
                    statusDiv.className = "mt-4 text-sm text-center text-red-400 font-bold";
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
    <style>
        :root {
            --caramel: #D4A574;
            --dark-bg: #0f0d0b;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark-bg);
            color: #F5EDE4;
        }
        .btn-primary {
            background-color: var(--caramel);
            color: black;
            font-weight: bold;
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen pb-32 flex flex-col items-center justify-center bg-[#0f0d0b]">

    <div id="login-view" class="w-full max-w-md bg-[#1a1714] p-6 rounded-2xl shadow-xl">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-[#D4A574]">Bienvenido al Rico Club</h1>
            <p class="text-sm text-gray-400 mt-2">Ingresa con tu número y PIN</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm mb-1 text-gray-300">Número de Teléfono</label>
                <div class="flex">
                    <select id="login-country" class="bg-black border border-gray-700 border-r-0 rounded-l-lg py-3 pl-3 pr-2 text-white/80 focus:outline-none focus:border-[#D4A574] transition-colors appearance-none">
                        <option value="+504">🇭🇳 +504</option>
                        <option value="+1">🇺🇸 +1</option>
                    </select>
                    <input type="tel" id="login-phone" class="w-full p-3 rounded-r-lg bg-black border border-gray-700 text-white focus:outline-none focus:border-[#D4A574]" placeholder="Ej. 9999-1234">
                </div>
            </div>
            <div>
                <label class="block text-sm mb-1 text-gray-300">PIN (4 dígitos)</label>
                <input type="password" id="login-pin" maxlength="4" class="w-full p-3 rounded-lg bg-black border border-gray-700 text-white text-center tracking-[0.5em] focus:outline-none focus:border-[#D4A574]" placeholder="••••">
            </div>
            <button onclick="handleLogin()" class="w-full btn-primary py-3 rounded-lg mt-4">Entrar / Crear PIN</button>
        </div>
    </div>

    <div id="dashboard-view" class="w-full max-w-md hidden space-y-6">
        <div class="flex justify-between items-center bg-[#1a1714] p-4 rounded-2xl border border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-full bg-gold/10 border border-gold/20 flex items-center justify-center text-gold font-display text-xl" id="user-initial-profile">-</div>
                <div>
                    <h2 class="text-lg font-bold text-white" id="user-name-profile">Cargando...</h2>
                    <p class="text-[10px] font-black text-white/30 uppercase tracking-widest" id="user-tier-profile">BRONZE MEMBER</p>
                </div>
            </div>
            <button onclick="logout()" class="text-xs bg-white/5 border border-white/10 px-4 py-2 rounded-xl hover:bg-red-500/10 hover:text-red-400 transition-all text-white/60 font-bold uppercase tracking-widest">
                <i class="fas fa-sign-out-alt mr-1"></i> Salir
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-[#1a1714] border border-white/5 p-4 rounded-2xl text-center shadow-lg">
                <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-1">Visitas</p>
                <p class="text-2xl font-bold text-white" id="stats-visits">0</p>
            </div>
            <div class="bg-[#1a1714] border border-white/5 p-4 rounded-2xl text-center shadow-lg">
                <p class="text-[10px] font-black text-white/30 uppercase tracking-widest mb-1">Total Consumo</p>
                <p class="text-2xl font-bold text-white">L. <span id="stats-spent">0</span></p>
            </div>
        </div>
        
        <div class="bg-[#1a1714] p-6 rounded-2xl border border-white/5">
            <h3 class="font-black text-xs text-gold uppercase tracking-widest mb-4">Historial de Órdenes</h3>
            <div id="order-history" class="space-y-3">
                <p class="text-white/20 text-center py-8 text-xs italic">Cargando historial...</p>
            </div>
        </div>

        <div class="p-4 bg-gold/5 border border-gold/10 rounded-2xl text-center">
            <p class="text-[10px] text-gold font-bold uppercase tracking-widest">Miembro desde: <span id="user-since" class="text-white">---</span></p>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const country = document.getElementById('login-country').value;
            const rawPhone = document.getElementById('login-phone').value.replace(/\D/g, '');
            const phone = country + rawPhone;
            const pin = document.getElementById('login-pin').value;
            
            if(!rawPhone || pin.length < 4) {
                alert("Por favor ingresa un número válido y un PIN de 4 dígitos.");
                return;
            }
            
            try {
                const btn = document.querySelector('#login-view button');
                const ogText = btn.innerText;
                btn.innerText = "Verificando...";
                btn.disabled = true;

                const res = await fetch('/api/customer/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, pin })
                });

                const data = await res.json();
                btn.innerText = ogText;
                btn.disabled = false;

                if (!res.ok) {
                    alert(data.error || "Error al iniciar sesión");
                    return;
                }

                localStorage.setItem('ra_customer_phone', phone);
                localStorage.setItem('ra_customer_pin', pin);
                localStorage.setItem('ra_customer_data', JSON.stringify(data.customer));

                showDashboard(data.customer);

            } catch (e) {
                alert("Error de conexión");
                console.error(e);
            }
        }

        function showDashboard(customer) {
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('dashboard-view').classList.remove('hidden');
            
            document.getElementById('user-name-profile').innerText = customer.name || "Usuario";
            document.getElementById('user-initial-profile').innerText = (customer.name || "U").charAt(0).toUpperCase();
            document.getElementById('user-tier-profile').innerText = `${customer.tier || 'BRONZE'} MEMBER`;
            
            document.getElementById('stats-visits').innerText = customer.visits || 0;
            document.getElementById('stats-spent').innerText = (parseFloat(customer.total_spent) || 0).toFixed(2);
            document.getElementById('user-since').innerText = new Date(customer.created_at || Date.now()).toLocaleDateString();

            fetchHistory(customer.id);
        }

        async function fetchHistory(customerId) {
            try {
                // Fetch customer orders
                const phone = localStorage.getItem('ra_customer_phone');
                const res = await fetch(`/api/customer/profile?phone=${encodeURIComponent(phone)}`);
                const data = await res.json();
                
                const container = document.getElementById('order-history');
                const orders = data.recent_orders || [];

                if (orders.length === 0) {
                    container.innerHTML = '<p class="text-white/20 text-center py-8 text-xs italic">No has realizado órdenes aún.</p>';
                    return;
                }

                container.innerHTML = orders.slice(0, 10).map(o => `
                    <div class="flex justify-between items-center p-3 bg-white/5 rounded-xl border border-white/5">
                        <div>
                            <p class="text-xs font-bold text-white">Orden #${o.order_number || '---'}</p>
                            <p class="text-[10px] text-white/40">${new Date(o.created_at).toLocaleDateString()}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xs font-bold text-gold">L. ${parseFloat(o.total).toFixed(2)}</p>
                            <p class="text-[9px] uppercase font-black ${o.status === 'completed' ? 'text-green-500' : 'text-orange-400'}">${o.status}</p>
                        </div>
                    </div>
                `).join('');
            } catch(e) {
                console.error("Failed to load history", e);
            }
        }

        async function refreshDashboard() {
            const savedPhone = localStorage.getItem('ra_customer_phone');
            if (savedPhone) {
                try {
                    const r = await fetch(`/api/customer/profile?phone=${encodeURIComponent(savedPhone)}`);
                    const data = await r.json();
                    if (data && !data.error) {
                        localStorage.setItem('ra_customer_data', JSON.stringify(data));
                        showDashboard(data);
                    }
                } catch(e) { console.log("Refresh failed", e); }
            }
        }

        window.addEventListener('focus', refreshDashboard);

        window.onload = async () => {
            const savedPhone = localStorage.getItem('ra_customer_phone');
            const savedData = localStorage.getItem('ra_customer_data');
            
            if (savedPhone) {
                if (savedData) {
                    showDashboard(JSON.parse(savedData));
                }
                await refreshDashboard();
            }
        }
        
        function logout() {
            localStorage.removeItem('ra_customer_phone');
            localStorage.removeItem('ra_customer_pin');
            localStorage.removeItem('ra_customer_data');
            location.reload();
        }
    </script>

        </a>
    </nav>

</body>
