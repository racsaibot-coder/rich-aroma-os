<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | KDS & Status</title>
    <script src="https://cdn.tailwindcss.com">        // --- BUMP BAR SUPPORT ---
        window.addEventListener('keydown', (e) => {
            // Spacebar, Enter, or Numpad Enter acts as "Bump"
            if (e.code === 'Space' || e.code === 'Enter' || e.code === 'NumpadEnter') {
                e.preventDefault();
                // Find the oldest active order currently visible on screen
                const activeOrders = orders.filter(o => {
                    if (o.status === 'completed') return false;
                    if (currentMode === 'drinks' && o.status === 'drinks_ready') return false;
                    if (currentMode === 'food' && o.status === 'food_ready') return false;
                    return true;
                });
                
                if (activeOrders.length > 0) {
                    // Sort by oldest first
                    activeOrders.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
                    const oldest = activeOrders[0];
                    if (oldest.status === 'pending' || oldest.status === 'paid') {
                        startOrder(oldest.id);
                    } else {
                        completeOrder(oldest.id);
                    }
                }
            }
        });
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A66B',
                        dark: '#1E1610',
                        charcoal: '#2C241E',
                        cream: '#F5F5F0',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1E1610; color: #F5F5F0; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1E1610; }
        ::-webkit-scrollbar-thumb { background: #2C241E; border-radius: 3px; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header / Toggle -->
    <header class="h-16 bg-charcoal border-b border-white/10 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold font-display text-gold tracking-widest">RICH AROMA OS</h1>
            <div class="px-3 py-1 rounded bg-white/5 text-xs font-mono" id="mode-badge">LOADING...</div>
        </div>
        
        <div class="flex bg-dark rounded-lg p-1 border border-white/5">
            <button onclick="setMode('drinks')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-drinks">☕️ BARISTA</button>
            <button onclick="setMode('food')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-food">🥞 KITCHEN</button>
            <button onclick="setMode('status')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-status">📺 CUSTOMER</button>
        </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- 1. KDS VIEW (Grid Layout) -->
        <div id="view-kds" class="hidden h-full overflow-y-auto p-6 bg-[#16100c]">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start" id="kds-grid">
                <!-- Tickets injected here -->
            </div>
        </div>

        <!-- 2. STATUS BOARD VIEW (Split Screen) -->
        <div id="view-status" class="hidden h-full flex">
            <!-- Left: Preparing -->
            <div class="w-1/2 border-r border-white/10 flex flex-col">
                <div class="h-20 bg-dark flex items-center justify-center border-b border-white/5">
                    <h2 class="text-2xl font-bold text-white/60 tracking-widest"><i class="fas fa-fire-alt mr-3 text-warning"></i> PREPARING</h2>
                </div>
                <div class="flex-1 p-8 space-y-4 overflow-y-auto" id="col-prep">
                    <!-- Names here -->
                </div>
            </div>

            <!-- Right: Ready -->
            <div class="w-1/2 flex flex-col bg-gold/5">
                <div class="h-20 bg-gold/10 flex items-center justify-center border-b border-gold/20">
                    <h2 class="text-3xl font-bold text-gold tracking-widest blink"><i class="fas fa-check-circle mr-3"></i> READY</h2>
                </div>
                <div class="flex-1 p-8 space-y-4 overflow-y-auto" id="col-ready">
                    <!-- Names here -->
                </div>
            </div>
            
            <!-- Bottom Ticker -->
            <div class="absolute bottom-0 w-full bg-dark border-t border-gold/20 py-3 overflow-hidden whitespace-nowrap">
                <div class="animate-marquee inline-block text-gold/80 font-mono text-lg">
                    🎥 CHALLENGE: Film your first sip & tag @RichAromaHN for a chance to win L.500!  •  📲 Skip the line next time: Load Rico Cash at the register!  •  🦁 RICH AROMA: Coffee & Culture.
                </div>
            </div>
        </div>

    </main>

    <script>
        // State
        let currentMode = 'drinks'; // drinks | food | status
        let orders = [];
        let previousPendingCount = 0; // Track for audio alerts

        // Audio Alerts
        const newOrderSound = new Audio('/assets/chime.mp3'); // We'll assume this exists or fails silently
        
        // Mock Data (Replace with API)
        const mockOrders = [
            { id: 'ORD-0091', num: 91, customer: 'NeeNee', items: [{name: 'Latte', type: 'drink'}, {name: 'Crêpe Nutella', type: 'food'}], status: 'pending', time: 2 },
            { id: 'ORD-0092', num: 92, customer: 'Oscar', items: [{name: 'Cold Brew', type: 'drink'}], status: 'pending', time: 5 },
            { id: 'ORD-0090', num: 90, customer: 'Guest', items: [{name: 'Cappuccino', type: 'drink'}], status: 'completed', time: 10 },
        ];

        // Init
        const urlParams = new URLSearchParams(window.location.search);
        const modeParam = urlParams.get('mode');
        if(modeParam) setMode(modeParam);
        else setMode('drinks');

        // Poll Loop
        setInterval(fetchOrders, 3000); // 3s poll
        fetchOrders();

// Audio Chime Logic
        let previousOrderCount = 0;
        let isFirstLoad = true;
        const chime = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // Simple bell ding

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders', {
                    headers: { 'Authorization': 'Bearer TEST_TOKEN_ADMIN' }
                });
                if (!res.ok) throw new Error("API returned " + res.status);
                const data = await res.json();
                
                const newOrders = data.orders || [];
                
                // Play chime if new order arrives (in pending/paid status)
                if (!isFirstLoad) {
                    const currentActive = newOrders.filter(o => o.status === 'pending' || o.status === 'paid' || o.status === 'preparing').length;
                    if (currentActive > previousOrderCount) {
                        chime.play().catch(e => console.log('Audio autoplay blocked by browser', e));
                    }
                    previousOrderCount = currentActive;
                } else {
                    previousOrderCount = newOrders.filter(o => o.status === 'pending' || o.status === 'paid' || o.status === 'preparing').length;
                    isFirstLoad = false;
                }

                orders = newOrders;
                render();
            } catch(e) {
                console.log("Offline mode / API Error", e);
                if (orders.length === 0) orders = mockOrders;
                render();
            }
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Update UI Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('bg-gold', 'text-dark', 'bg-white/5', 'text-white');
                if(btn.id === `btn-${mode}`) btn.classList.add('bg-gold', 'text-dark');
                else btn.classList.add('bg-white/5', 'text-white/60');
            });

            document.getElementById('mode-badge').innerText = mode.toUpperCase() + " MODE";

            // Toggle Views
            document.getElementById('view-kds').classList.add('hidden');
            document.getElementById('view-status').classList.add('hidden');

            if(mode === 'status') {
                document.getElementById('view-status').classList.remove('hidden');
            } else {
                document.getElementById('view-kds').classList.remove('hidden');
            }
            
            render();
        }

        function render() {
            if(currentMode === 'status') renderStatusBoard();
            else renderKDS();
        }

        // Store previously rendered order IDs to avoid full DOM redraws
        let renderedOrderIds = new Set();

        
        function isDrinkItem(name) {
            name = (name || '').toLowerCase();
            return name.includes('latte') || name.includes('brew') || name.includes('capp') || 
                   name.includes('tea') || name.includes('icee') || name.includes('espresso') || 
                   name.includes('mocha') || name.includes('matcha') || name.includes('frappe') || 
                   name.includes('macchiato') || name.includes('jugo') || name.includes('licuado') || 
                   name.includes('granita') || name.includes('smoothie');
        }
        
        function isComboItem(name) {
            return (name || '').toLowerCase().includes('combo');
        }

        function renderKDS() {
            const grid = document.getElementById('kds-grid');
            grid.innerHTML = '';
            
            // Filter orders that are NOT completed
            const activeOrders = orders.filter(o => {
                if (o.status === 'completed') return false;
                if (currentMode === 'drinks' && o.status === 'drinks_ready') return false;
                if (currentMode === 'food' && o.status === 'food_ready') return false;
                return true;
            });
            
            activeOrders.forEach(order => {
                // Filter Items based on Mode
                const relevantItems = (order.items || []).filter(item => {
                    const name = item.name || '';
                    const isDrink = isDrinkItem(name);
                    const isCombo = isComboItem(name);
                    
                    if(currentMode === 'drinks') return isDrink || isCombo;
                    if(currentMode === 'food') return !isDrink || isCombo; // Combos show on both
                    return true;
                });

                if(relevantItems.length === 0) return; // Skip ticket if nothing for this station
                
                // Time Color
                const elapsed = (new Date() - new Date(order.created_at)) / 1000 / 60; // Mins
                let timeColor = 'bg-white/5';
                if(elapsed > 5) timeColor = 'bg-yellow-500/10 border-yellow-500/50';
                if(elapsed > 10) timeColor = 'bg-red-500/10 border-red-500/50';

                const card = document.createElement('div');
                card.id = `kds-order-${order.id}`;
                card.className = `p-5 rounded-2xl shadow-xl border border-white/10 flex flex-col gap-4 ${timeColor} break-inside-avoid transition-all duration-300 transform bg-[#251D17] hover:-translate-y-1`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center border-b border-white/10 pb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-12 h-12 bg-white/5 rounded-full flex items-center justify-center font-bold text-xl text-gold border border-gold/20">
                                ${order.order_number}
                            </div>
                            <div>
                                <h3 class="font-bold text-lg text-white">${order.customers?.name || 'Guest'}</h3>
                                <div class="flex gap-2 mt-1">
                                    <span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-white/70 font-bold uppercase tracking-wider">${order.fulfillment_type === 'delivery' ? '🚗 Delivery' : order.fulfillment_type === 'pickup' ? '🛍️ Pickup' : '🍽️ Dine-in'}</span>
                                    ${order.payment_method === 'split_cash' ? '<span class="text-[10px] bg-red-500/20 px-2 py-0.5 rounded text-red-400 font-bold uppercase tracking-wider border border-red-500/50">COBRAR EFECTIVO</span>' : ''}
                                    ${order.payment_method === 'split_transfer' ? '<span class="text-[10px] bg-orange-500/20 px-2 py-0.5 rounded text-orange-400 font-bold uppercase tracking-wider border border-orange-500/50">SPLIT: TRANSFER</span>' : ''}
                                    ${order.payment_method === 'rico_balance' ? '<span class="text-[10px] bg-gold/20 px-2 py-0.5 rounded text-gold font-bold uppercase tracking-wider border border-gold/50">100% RICO CASH</span>' : ''}
                                    ${order.status === 'preparing' ? '<span class="text-[10px] bg-blue-500/20 px-2 py-0.5 rounded text-blue-300 font-bold uppercase tracking-wider blink">En Proceso</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="font-mono text-sm font-bold ${elapsed > 10 ? 'text-red-400' : elapsed > 5 ? 'text-yellow-400' : 'text-green-400'} timer-display" data-time="${order.created_at}">${Math.floor(elapsed)}m</span>
                        </div>
                    </div>
                    
                    <div class="space-y-3 flex-1 py-2">
                        ${relevantItems.map(i => {

                            // Modifier Filtering Logic
                            let filteredMods = i.mods || [];
                            let displayName = i.name;
                            if (isComboItem(i.name)) {
                                if (currentMode === 'drinks') {
                                    // Barista only sees drink-related mods (e.g. Bebida de Combo, Milk Type, Frappe Add-ons)
                                    filteredMods = filteredMods.filter(m => 
                                        m.name.toLowerCase().includes('bebida') || 
                                        m.name.toLowerCase().includes('milk') || 
                                        m.name.toLowerCase().includes('leche') || 
                                        m.name.toLowerCase().includes('frappe') || 
                                        m.name.toLowerCase().includes('jugo') || 
                                        m.name.toLowerCase().includes('granita') || 
                                        m.name.toLowerCase().includes('iced')
                                    );
                                    
                                    // Override item name to just show it's a combo drink, avoiding the long food name
                                    displayName = "Bebida (Combo)";
                                    
                                } else if (currentMode === 'food') {
                                    // Kitchen sees everything EXCEPT the drink mods
                                    filteredMods = filteredMods.filter(m => 
                                        !m.name.toLowerCase().includes('bebida') && 
                                        !m.name.toLowerCase().includes('milk') && 
                                        !m.name.toLowerCase().includes('leche') && 
                                        !m.name.toLowerCase().includes('frappe') && 
                                        !m.name.toLowerCase().includes('jugo') && 
                                        !m.name.toLowerCase().includes('granita') && 
                                        !m.name.toLowerCase().includes('iced')
                                    );
                                }
                            }

                            return `
                            <div class="p-3 bg-white/5 rounded-xl border border-white/5">
                                <div class="flex justify-between items-start text-lg ${i.is_addon ? 'text-yellow-400 font-bold bg-yellow-500/10 p-2 rounded-lg' : ''}">
                                    <div class="flex gap-3">
                                        <span class="font-bold text-gold bg-gold/10 px-2 py-0.5 rounded h-min">${i.quantity || i.qty || 1}x</span>
                                        <div class="flex flex-col">
                                            <span class="${i.is_addon ? 'text-yellow-400' : 'text-white/90'} leading-tight">${displayName}</span>
                                            ${i.is_addon ? '<span class="text-[10px] bg-yellow-500 text-dark px-1.5 py-0.5 rounded w-max mt-1">NUEVO ADD-ON</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                ${filteredMods.length > 0 ? `
                                <div class="mt-2 pl-12 space-y-1">
                                    ${filteredMods.map(m=>`<div class="text-sm text-white/50 flex items-center before:content-[''] before:w-1 before:h-1 before:bg-white/20 before:rounded-full before:mr-2">${m.name}</div>`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            `;
                        }).join('')}
                        ${order.notes ? `
                            <div class="mt-3 text-sm bg-orange-500/10 text-orange-300 p-3 rounded-xl border border-orange-500/20 font-medium flex gap-2 flex-col">
                                <div class="flex gap-2">
                                    <i class="fas fa-exclamation-circle mt-1"></i> 
                                    <div class="break-words w-full">
                                        ${order.notes.replace(/\[RECEIPT_URL:(.*?)\]/g, '<a href="$1" target="_blank" class="text-blue-400 underline block mt-2 p-2 bg-black/30 rounded border border-blue-500/30 text-center"><i class="fas fa-receipt mr-1"></i> Ver Recibo</a>')}
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    ${(order.status === 'pending' || order.status === 'paid') ? `
                    <button onclick="startOrder('${order.id}')" class="w-full py-4 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-xl transition-all mt-2 active:scale-95 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                        <i class="fas fa-fire-alt mr-2"></i> EMPEZAR
                    </button>
                    ` : `
                    <button onclick="completeOrder('${order.id}')" class="w-full py-4 bg-success hover:bg-green-400 text-white font-bold rounded-xl transition-all mt-2 active:scale-95 shadow-[0_0_15px_rgba(16,185,129,0.3)]">
                        <i class="fas fa-check-circle mr-2"></i> LISTO
                    </button>
                    `}
                `;
                grid.appendChild(card);
            });
        }

        function renderStatusBoard() {
            const colPrep = document.getElementById('col-prep');
            const colReady = document.getElementById('col-ready');
            
            colPrep.innerHTML = '';
            colReady.innerHTML = '';

            // Status Logic
            // Active = Preparing
            // Completed (Recently) = Ready
            
            orders.forEach(order => {
                if(order.status === 'pending' || order.status === 'paid' || order.status === 'preparing') {
                    // Preparing
                    colPrep.innerHTML += `
                        <div class="text-4xl text-white/50 font-bold font-mono py-2 border-b border-white/5">
                            #${order.order_number} <span class="text-2xl text-white/20 ml-4">${order.customers?.name || ''}</span>
                        </div>
                    `;
                } else if(order.status === 'completed') {
                    // Only show if completed in last 15 mins
                    const doneTime = new Date(order.completed_at || order.created_at); // Fallback
                    const now = new Date();
                    if((now - doneTime) < 15 * 60 * 1000) {
                        colReady.innerHTML += `
                            <div class="text-5xl text-gold font-bold font-mono py-4 border-b border-gold/10 flex justify-between items-center">
                                <span>#${order.order_number}</span>
                                <i class="fas fa-check text-3xl"></i>
                            </div>
                        `;
                    }
                }
            });
        }

        async function startOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            // Optimistic UI
            order.status = 'preparing';
            render();
            
            // API Call
            await fetch(`/api/orders/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: 'preparing' })
            });
        }

        async function completeOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            let hasDrinks = false;
            let hasFood = false;

            (order.items || []).forEach(item => {
                const name = item.name || '';
                if (isDrinkItem(name) || isComboItem(name)) hasDrinks = true;
                if (!isDrinkItem(name) || isComboItem(name)) hasFood = true;
            });

            let newStatus = 'completed';

            if (hasDrinks && hasFood) {
                if (currentMode === 'drinks') {
                    newStatus = order.status === 'food_ready' ? 'completed' : 'drinks_ready';
                } else if (currentMode === 'food') {
                    newStatus = order.status === 'drinks_ready' ? 'completed' : 'food_ready';
                }
            }

            // Optimistic UI
            order.status = newStatus;
            render();
            
            // API Call
            await fetch(`/api/orders/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ status: newStatus })
            });
        }
    </script>
    
    <style>
        .animate-marquee { animation: marquee 20s linear infinite; }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</body>
</html>
