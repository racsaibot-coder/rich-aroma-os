<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | KDS & Status</title>
    <script src="https://cdn.tailwindcss.com">        // --- BUMP BAR SUPPORT ---
        window.addEventListener('keydown', (e) => {
            // Spacebar, Enter, or Numpad Enter acts as "Bump"
            if (e.code === 'Space' || e.code === 'Enter' || e.code === 'NumpadEnter') {
                e.preventDefault();
                // Find the oldest active order currently visible on screen
                const activeOrders = orders.filter(o => {
                    if (o.status === 'completed') return false;
                    if (currentMode === 'drinks' && o.status === 'drinks_ready') return false;
                    if (currentMode === 'food' && o.status === 'food_ready') return false;
                    return true;
                });
                
                if (activeOrders.length > 0) {
                    // Sort by oldest first
                    activeOrders.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
                    const oldest = activeOrders[0];
                    if (oldest.status === 'pending' || oldest.status === 'paid') {
                        startOrder(oldest.id);
                    } else {
                        completeOrder(oldest.id);
                    }
                }
            }
        });
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A66B',
                        dark: '#1E1610',
                        charcoal: '#2C241E',
                        cream: '#F5F5F0',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1E1610; color: #F5F5F0; font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1E1610; }
        ::-webkit-scrollbar-thumb { background: #2C241E; border-radius: 3px; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header / Toggle -->
    <header class="h-16 bg-charcoal border-b border-white/10 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <h1 class="text-xl font-bold font-display text-gold tracking-widest">RICH AROMA OS</h1>
            <div class="px-3 py-1 rounded bg-white/5 text-xs font-mono" id="mode-badge">LOADING...</div>
        </div>
        
        <div class="flex bg-dark rounded-lg p-1 border border-white/5">
            <button onclick="setMode('drinks')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-drinks">☕️ BARISTA</button>
            <button onclick="setMode('food')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-food">🥞 KITCHEN</button>
            <button onclick="setMode('status')" class="px-4 py-2 rounded text-sm font-bold transition-all mode-btn" id="btn-status">📺 CUSTOMER</button>
        </div>
    </header>

    <!-- CONTENT AREA -->
    <main class="flex-1 overflow-hidden relative">
        
        <!-- 1. KDS VIEW (Grid Layout) -->
        <div id="view-kds" class="hidden h-full overflow-y-auto p-6 bg-[#16100c]">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-start" id="kds-grid">
                <!-- Tickets injected here -->
            </div>
        </div>

        <!-- 2. STATUS BOARD VIEW (Split Screen) -->
        <div id="view-status" class="hidden h-full flex">
            <!-- Left: Preparing -->
            <div class="w-1/2 border-r border-white/10 flex flex-col">
                <div class="h-20 bg-dark flex items-center justify-center border-b border-white/5">
                    <h2 class="text-2xl font-bold text-white/60 tracking-widest"><i class="fas fa-fire-alt mr-3 text-warning"></i> PREPARING</h2>
                </div>
                <div class="flex-1 p-8 space-y-4 overflow-y-auto" id="col-prep">
                    <!-- Names here -->
                </div>
            </div>

            <!-- Right: Ready -->
            <div class="w-1/2 flex flex-col bg-gold/5">
                <div class="h-20 bg-gold/10 flex items-center justify-center border-b border-gold/20">
                    <h2 class="text-3xl font-bold text-gold tracking-widest blink"><i class="fas fa-check-circle mr-3"></i> READY</h2>
                </div>
                <div class="flex-1 p-8 space-y-4 overflow-y-auto" id="col-ready">
                    <!-- Names here -->
                </div>
            </div>
            
            <!-- Bottom Ticker -->
            <div class="absolute bottom-0 w-full bg-dark border-t border-gold/20 py-3 overflow-hidden whitespace-nowrap">
                <div class="animate-marquee inline-block text-gold/80 font-mono text-lg">
                    🎥 CHALLENGE: Film your first sip & tag @richaromacoffee for a chance to win L.500!  •  📲 Skip the line next time: Load Rico Cash at the register!  •  🦁 RICH AROMA: Coffee & Culture.
                </div>
            </div>
        </div>

    </main>

    <script>
        // State
        let currentMode = 'drinks'; // drinks | food | status
        let orders = [];
        let previousPendingCount = 0; // Track for audio alerts

        // Audio Alerts
        const newOrderSound = new Audio('/assets/chime.mp3'); // We'll assume this exists or fails silently
        
        // Mock Data (Replace with API)
        const mockOrders = [
            { id: 'ORD-0091', num: 91, customer: 'NeeNee', items: [{name: 'Latte', type: 'drink'}, {name: 'Crêpe Nutella', type: 'food'}], status: 'pending', time: 2 },
            { id: 'ORD-0092', num: 92, customer: 'Oscar', items: [{name: 'Cold Brew', type: 'drink'}], status: 'pending', time: 5 },
            { id: 'ORD-0090', num: 90, customer: 'Guest', items: [{name: 'Cappuccino', type: 'drink'}], status: 'completed', time: 10 },
        ];

        // Init
        const urlParams = new URLSearchParams(window.location.search);
        const modeParam = urlParams.get('mode');
        if(modeParam) setMode(modeParam);
        else setMode('drinks');

        // Poll Loop
        setInterval(fetchOrders, 3000); // 3s poll
        
        // Full Sync Loop (Resilience against missed orders)
        setInterval(() => {
            console.log("[KDS] Running Full Heartbeat Sync...");
            lastRenderData = ""; // Force a full DOM redraw
            fetchOrders();
        }, 60000); // 60s full sync

        setInterval(() => {
            document.querySelectorAll('.timer-display').forEach(el => {
                const time = el.getAttribute('data-time');
                if(time) {
                    const orderTime = new Date(time);
                    const now = new Date();
                    let diffMs = now - orderTime;
                    if(diffMs < 0) diffMs = 0;
                    const elapsed = diffMs / 1000 / 60;
                    el.innerText = Math.floor(elapsed) + 'm';
                    if(elapsed > 10) el.className = "font-mono text-sm font-bold text-red-400 timer-display";
                    else if(elapsed > 5) el.className = "font-mono text-sm font-bold text-yellow-400 timer-display";
                    else el.className = "font-mono text-sm font-bold text-green-400 timer-display";
                }
            });
        }, 15000); // 15s timer update

        fetchOrders();

// Audio Chime Logic
        let previousOrderCount = 0;
        let isFirstLoad = true;
        const chime = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3'); // Simple bell ding

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders', {
                    headers: { 'Authorization': 'Bearer TEST_TOKEN_ADMIN' }
                });
                if (!res.ok) throw new Error("API returned " + res.status);
                const data = await res.json();
                
                const newOrders = data.orders || [];
                
                // Play chime if new order arrives (in pending/paid status)
                if (!isFirstLoad) {
                    const currentActive = newOrders.filter(o => o.status === 'pending' || o.status === 'paid' || o.status === 'preparing').length;
                    if (currentActive > previousOrderCount) {
                        chime.play().catch(e => console.log('Audio autoplay blocked by browser', e));
                    }
                    previousOrderCount = currentActive;
                } else {
                    previousOrderCount = newOrders.filter(o => o.status === 'pending' || o.status === 'paid' || o.status === 'preparing').length;
                    isFirstLoad = false;
                }

                // Filter out reloads (those don't need to be in KDS)
                orders = newOrders.filter(o => {
                    const hasOnlyReload = o.items && o.items.every(i => i.id === 'rico_cash_reload');
                    return !hasOnlyReload;
                });
                render();
            } catch(e) {
                console.log("Offline mode / API Error", e);
                if (orders.length === 0) orders = mockOrders;
                render();
            }
        }

        function getDisplayName(order) {
            if (order.customers?.name) return order.customers.name;
            if (order.notes) {
                const clientMatch = order.notes.match(/\[CLIENTE:\s*([^\]]+)\]/);
                if (clientMatch) return clientMatch[1].trim();
                const guestMatch = order.notes.match(/\[GUEST:\s*([^|\]]+)/);
                if (guestMatch) return guestMatch[1].trim();
            }
            return 'Invitado';
        }

        function setMode(mode) {
            currentMode = mode;
            
            // Update UI Buttons
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('bg-gold', 'text-dark', 'bg-white/5', 'text-white');
                if(btn.id === `btn-${mode}`) btn.classList.add('bg-gold', 'text-dark');
                else btn.classList.add('bg-white/5', 'text-white/60');
            });

            document.getElementById('mode-badge').innerText = mode.toUpperCase() + " MODE";

            // Toggle Views
            document.getElementById('view-kds').classList.add('hidden');
            document.getElementById('view-status').classList.add('hidden');

            if(mode === 'status') {
                document.getElementById('view-status').classList.remove('hidden');
            } else {
                document.getElementById('view-kds').classList.remove('hidden');
            }
            
            render();
        }

        function render() {
            try {
                if(currentMode === 'status') renderStatusBoard();
                else renderKDS();
            } catch(e) { console.error("Render error", e); }
        }

        function isDrinkItem(item) {
            if (!item) return false;
            const name = (item.name || '').toLowerCase();
            const id = (item.id || '').toLowerCase();
            const cat = (item.category || '').toLowerCase();
            if (id === 'vip_membership' || name.includes('membresía')) return false;

            // Dubai items are food/chocolate items, not drinks
            if (name.includes('dubai')) return false;

            return id.startsWith('hot_') || id.startsWith('cold_') || id.startsWith('frappe_') || 
                   name.includes('latte') || name.includes('brew') || name.includes('capp') || 
                   name.includes('tea') || name.includes('te ') || name.includes('icee') || 
                   name.includes('espresso') || name.includes('mocha') || name.includes('matcha') || 
                   name.includes('frappe') || name.includes('macchiato') || name.includes('jugo') || 
                   name.includes('licuado') || name.includes('granita') || name.includes('smoothie') || 
                   name.includes('caliente') || name.includes('helada') || name.includes('americano') ||
                   name.includes('chocolate') || name.includes('cafe') || name.includes('café') ||
                   name.includes('combo') || cat.includes('coffee') || cat.includes('drinks') || cat.includes('heladas');
        }
        
        function isFoodItem(item) {
            if (!item) return false;
            const name = (item.name || '').toLowerCase();
            const id = (item.id || '').toLowerCase();
            const cat = (item.category || '').toLowerCase();
            if (id === 'vip_membership' || name.includes('membresía')) return false;
            return id.startsWith('food_') || name.includes('baleada') || name.includes('sandwich') || 
                   name.includes('crepa') || name.includes('bowl') || name.includes('toast') || 
                   name.includes('melt') || name.includes('fries') || name.includes('papas') || 
                   name.includes('burger') || name.includes('hamburguesa') || name.includes('combo') ||
                   cat.includes('food') || cat.includes('comida');
        }

        function isComboItem(name) {
            return (name || '').toLowerCase().includes('combo');
        }

        // Store previously rendered state to avoid flicker
        let lastRenderData = "";

        function renderKDS() {
            const activeOrders = orders.filter(o => {
                if (o.status === 'completed') return false;
                if (o.status === 'cancelled') return false;
                
                // Approve logic: Hide pending transfer orders until approved/paid
                // But allow 'cash' pending orders because they are "Send to Kitchen" from POS
                if (o.status === 'pending' && o.payment_method === 'transfer') return false;
                if (o.status === 'pending_verification') return false;

                // Don't show membership-only orders on KDS
                const hasOnlyMembership = (o.items || []).every(i => i.id === 'vip_membership');
                if (hasOnlyMembership) return false;

                if (currentMode === 'drinks' && o.status === 'drinks_ready') return false;
                if (currentMode === 'food' && o.status === 'food_ready') return false;
                return true;
            });

            // Fingerprint to avoid redraw if data is identical
            const currentFingerprint = JSON.stringify(activeOrders.map(o => ({id: o.id, status: o.status}))) + currentMode;
            if (currentFingerprint === lastRenderData) return;
            lastRenderData = currentFingerprint;

            const grid = document.getElementById('kds-grid');
            grid.innerHTML = '';
            
            activeOrders.forEach(order => {
                // Filter Items based on Mode
                const relevantItems = (order.items || []).filter(item => {
                    if (item.is_old && !item.is_addon) {
                        // If it's old and not an addon, only show if we want full history, 
                        // but for production KDS we primarily want to hide redundant items.
                        // We'll keep them but mark them as dimmed below.
                    }
                    if(currentMode === 'drinks') return isDrinkItem(item) || isComboItem(item.name);
                    if(currentMode === 'food') return isFoodItem(item);
                    return true;
                });

                // Optimization: If all items in this ticket for this station are "is_old", 
                // it means the kitchen already did them. Hide the ticket to avoid clutter.
                const hasNewWork = relevantItems.some(i => i.is_addon || !i.is_old);
                if (!hasNewWork && relevantItems.length > 0) return;

                if(relevantItems.length === 0) return; // Skip ticket if nothing for this station
                
                // Extra check for combos: if in drink mode, does it HAVE a drink choice?
                // If in food mode, does it HAVE a food choice?
                const actualRelevantItems = relevantItems.filter(item => {
                    if (isComboItem(item.name)) {
                        const mods = item.mods || [];
                        const hasDrinkMod = mods.some(m => 
                            m.name.toLowerCase().includes('bebida') || 
                            m.name.toLowerCase().includes('jugo') || 
                            m.name.toLowerCase().includes('granita') || 
                            m.name.toLowerCase().includes('frappe') ||
                            m.name.toLowerCase().includes('iced')
                        );
                        if (currentMode === 'drinks') return hasDrinkMod;
                        if (currentMode === 'food') return true; // Combos always have food base
                    }
                    return true;
                });

                if(actualRelevantItems.length === 0) return;
                
                // Time Color
                const orderTime = new Date(order.created_at);
                const now = new Date();
                let diffMs = now - orderTime;
                if (diffMs < 0) diffMs = 0;
                const elapsed = diffMs / 1000 / 60; // Mins
                let timeColor = 'bg-white/5';
                if(elapsed > 5) timeColor = 'bg-yellow-500/10 border-yellow-500/50';
                if(elapsed > 10) timeColor = 'bg-red-500/10 border-red-500/50';

                const card = document.createElement('div');
                card.id = `kds-order-${order.id}`;
                card.className = `p-5 rounded-2xl shadow-xl border border-white/10 flex flex-col gap-4 ${timeColor} break-inside-avoid transition-all duration-300 transform bg-[#251D17] hover:-translate-y-1`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start border-b border-white/10 pb-4">
                        <div class="flex items-start gap-3 flex-1 overflow-hidden">
                            <div class="min-w-[3.5rem] h-10 bg-white/5 rounded-lg flex items-center justify-center font-mono font-black text-lg text-gold border border-gold/20 px-2">
                                #${order.order_number}
                            </div>
                            <div class="overflow-hidden">
                                <h3 class="font-bold text-lg text-white truncate">${getDisplayName(order)}</h3>
                                <div class="flex flex-wrap gap-1.5 mt-1">
                                    <span class="text-[9px] bg-white/10 px-2 py-0.5 rounded text-white/70 font-bold uppercase tracking-wider">${order.fulfillment_type === 'delivery' ? '🚗 Delivery' : order.fulfillment_type === 'pickup' ? '🛍️ Pickup' : '🍽️ Dine-in'}</span>
                                    ${order.payment_method === 'split_cash' ? '<span class="text-[9px] bg-red-500/20 px-2 py-0.5 rounded text-red-400 font-bold uppercase tracking-wider border border-red-500/50">COBRAR</span>' : ''}
                                    ${order.payment_method === 'rico_balance' ? '<span class="text-[9px] bg-gold/20 px-2 py-0.5 rounded text-gold font-bold uppercase tracking-wider border border-gold/50">RICO CASH</span>' : ''}
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col items-end shrink-0 ml-2">
                            <span class="font-mono text-sm font-bold ${elapsed > 10 ? 'text-red-400' : elapsed > 5 ? 'text-yellow-400' : 'text-green-400'} timer-display" data-time="${order.created_at}">${Math.floor(elapsed)}m</span>
                        </div>
                    </div>
                    
                    <div class="space-y-3 flex-1 py-2">
                        ${actualRelevantItems.map(i => {

                            // Modifier Filtering Logic
                            let filteredMods = i.mods || [];
                            let displayName = i.name;
                            if (isComboItem(i.name)) {
                                if (currentMode === 'drinks') {
                                    // Barista only sees drink-related mods (e.g. Bebida de Combo, Milk Type, Frappe Add-ons)
                                    filteredMods = filteredMods.filter(m => 
                                        m.name.toLowerCase().includes('bebida') || 
                                        m.name.toLowerCase().includes('milk') || 
                                        m.name.toLowerCase().includes('leche') || 
                                        m.name.toLowerCase().includes('frappe') || 
                                        m.name.toLowerCase().includes('jugo') || 
                                        m.name.toLowerCase().includes('granita') || 
                                        m.name.toLowerCase().includes('iced')
                                    );
                                    
                                    // Override item name to just show it's a combo drink, avoiding the long food name
                                    displayName = "Bebida (Combo)";
                                    
                                } else if (currentMode === 'food') {
                                    // Kitchen sees everything EXCEPT the drink mods
                                    filteredMods = filteredMods.filter(m => 
                                        !m.name.toLowerCase().includes('bebida') && 
                                        !m.name.toLowerCase().includes('milk') && 
                                        !m.name.toLowerCase().includes('leche') && 
                                        !m.name.toLowerCase().includes('frappe') && 
                                        !m.name.toLowerCase().includes('jugo') && 
                                        !m.name.toLowerCase().includes('granita') && 
                                        !m.name.toLowerCase().includes('iced')
                                    );
                                }
                            }

                            return `
                            <div class="p-3 bg-white/5 rounded-xl border border-white/5 ${i.is_old ? 'opacity-30' : ''}">
                                <div class="flex justify-between items-start text-lg ${i.is_addon ? 'text-yellow-400 font-bold bg-yellow-500/10 p-2 rounded-lg' : ''}">
                                    <div class="flex gap-3">
                                        <span class="font-bold text-gold bg-gold/10 px-2 py-0.5 rounded h-min">${i.quantity || i.qty || 1}x</span>
                                        <div class="flex flex-col">
                                            <span class="${i.is_addon ? 'text-yellow-400' : (i.is_old ? 'text-white/40' : 'text-white/90')} leading-tight">${displayName}</span>
                                            ${i.is_addon ? '<span class="text-[10px] bg-yellow-500 text-dark px-1.5 py-0.5 rounded w-max mt-1">NUEVO ADD-ON</span>' : ''}
                                            ${i.is_old ? '<span class="text-[8px] text-white/20 uppercase font-bold mt-1">Ya Entregado</span>' : ''}
                                        </div>
                                    </div>
                                </div>
                                ${filteredMods.length > 0 ? `
                                <div class="mt-2 pl-12 space-y-1">
                                    ${filteredMods.map(m=>`<div class="text-sm text-white/50 flex items-center before:content-[''] before:w-1 before:h-1 before:bg-white/20 before:rounded-full before:mr-2">${m.name}</div>`).join('')}
                                </div>
                                ` : ''}
                            </div>
                            `;
                        }).join('')}
                        ${order.notes ? `
                            <div class="mt-3 text-sm bg-orange-500/10 text-orange-300 p-3 rounded-xl border border-orange-500/20 font-medium flex gap-2 flex-col">
                                <div class="flex gap-2">
                                    <i class="fas fa-exclamation-circle mt-1"></i> 
                                    <div class="break-words w-full">
                                        ${order.notes.replace(/\[RECEIPT_URL:(.*?)\]/g, '<a href="$1" target="_blank" class="text-blue-400 underline block mt-2 p-2 bg-black/30 rounded border border-blue-500/30 text-center"><i class="fas fa-receipt mr-1"></i> Ver Recibo</a>')}
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>

                    ${(order.status === 'pending' || order.status === 'paid') ? `
                    <button onclick="startOrder('${order.id}')" class="w-full py-4 bg-blue-500 hover:bg-blue-400 text-white font-bold rounded-xl transition-all mt-2 active:scale-95 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                        <i class="fas fa-fire-alt mr-2"></i> EMPEZAR
                    </button>
                    ` : `
                    <button onclick="completeOrder('${order.id}')" class="w-full py-4 bg-success hover:bg-green-400 text-white font-bold rounded-xl transition-all mt-2 active:scale-95 shadow-[0_0_15px_rgba(16,185,129,0.3)] uppercase tracking-widest">
                        <i class="fas fa-check-circle mr-2"></i> Marcar Listo
                    </button>
                    `}                `;
                grid.appendChild(card);
            });
        }

        function renderStatusBoard() {
            // Fingerprint for status board
            const currentFingerprint = JSON.stringify(orders.map(o => ({id: o.id, status: o.status}))) + currentMode;
            if (currentFingerprint === lastRenderData) return;
            lastRenderData = currentFingerprint;

            const colPrep = document.getElementById('col-prep');
            const colReady = document.getElementById('col-ready');
            
            colPrep.innerHTML = '';
            colReady.innerHTML = '';

            // Status Logic
            orders.forEach((order, index) => {
                if(order.status === 'pending' || order.status === 'paid' || order.status === 'preparing') {
                    // Approve logic: Hide pending cash/transfer orders until approved/paid
                    if (order.status === 'pending' && (order.payment_method === 'cash' || order.payment_method === 'transfer')) return;

                    // Preparing (Giant Text)
                    colPrep.innerHTML += `
                        <div class="text-6xl text-white/40 font-black font-mono py-6 border-b border-white/5 flex items-center gap-6">
                            <span class="text-gold/30">#</span>${order.order_number} 
                            <span class="text-3xl text-white/10 uppercase truncate">${getDisplayName(order).split(' ')[0] || ''}</span>
                        </div>
                    `;
                } else if(order.status === 'completed' || order.status === 'ready') {
                    // Only show if completed in last 10 mins
                    const doneTime = new Date(order.completed_at || order.created_at);
                    const now = new Date();
                    if((now - doneTime) < 10 * 60 * 1000) {
                        const isNewest = index === 0; // Simple highlight for first ready
                        colReady.innerHTML += `
                            <div class="text-8xl text-gold font-black font-mono py-10 border-b border-gold/10 flex justify-between items-center ${isNewest ? 'animate-in zoom-in-95 duration-500' : ''}">
                                <span><span class="text-gold/20">#</span>${order.order_number}</span>
                                <i class="fas fa-check-circle text-5xl opacity-50"></i>
                            </div>
                        `;
                    }
                }
            });
        }

        async function startOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            // Optimistic UI
            order.status = 'preparing';
            render();
            
            try {
                // API Call
                const res = await fetch(`/api/orders/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: 'preparing' })
                });
                if (!res.ok) throw new Error("Update failed");
            } catch(e) {
                console.error(e);
                alert("Error al iniciar orden");
                fetchOrders(); // Refresh to revert
            }
        }

        async function completeOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            let hasDrinks = false;
            let hasFood = false;

            (order.items || []).forEach(item => {
                if (isDrinkItem(item) || isComboItem(item.name)) hasDrinks = true;
                if (isFoodItem(item)) hasFood = true;
            });

            let newStatus = 'completed';

            if (hasDrinks && hasFood) {
                if (currentMode === 'drinks') {
                    newStatus = (order.status === 'food_ready' || order.status === 'ready') ? 'completed' : 'drinks_ready';
                } else if (currentMode === 'food') {
                    newStatus = (order.status === 'drinks_ready' || order.status === 'ready') ? 'completed' : 'food_ready';
                }
            }

            // Optimistic UI
            order.status = newStatus;
            render();
            
            try {
                // API Call
                const res = await fetch(`/api/orders/${id}`, {
                    method: 'PATCH',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ status: newStatus })
                });
                if (!res.ok) throw new Error("Update failed");
            } catch(e) {
                console.error(e);
                alert("Error al completar orden");
                fetchOrders(); // Refresh to revert
            }
        }

        async function rejectOrder(id, num, phone, name) {
            const reason = prompt(`Motivo de rechazo para orden #${num}:`, "Captura de pantalla no válida o transferencia no recibida.");
            if (reason === null) return;
            
            try {
                const res = await fetch(`/api/orders/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        status: 'cancelled',
                        notes: `[REJECTED] ${reason}`
                    })
                });
                
                if(res.ok) {
                    if (phone) {
                        const message = `Hola ${name.split(' ')[0]}, tu solicitud de membresía #${num} fue rechazada por: ${reason}. Por favor intenta de nuevo con una captura válida.`;
                        const waUrl = `https://wa.me/${phone.replace(/\D/g, '')}?text=${encodeURIComponent(message)}`;
                        if(confirm("Orden rechazada. ¿Deseas notificar al cliente vía WhatsApp?")) {
                            window.open(waUrl, '_blank');
                        }
                    }
                    fetchOrders();
                } else {
                    alert("Error al rechazar.");
                }
            } catch(e) { console.error(e); }
        }
    </script>
    
    <style>
        .animate-marquee { animation: marquee 20s linear infinite; }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
    </style>
</body>
