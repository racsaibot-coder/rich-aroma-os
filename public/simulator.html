<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rich Aroma OS - Flow Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }
        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: #e0e0e0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        .container {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow-x: auto;
            align-items: center;
            justify-content: center;
        }
        .column {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1e1e1e;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
            height: calc(100% - 40px);
            justify-content: center;
        }
        .column-title {
            margin-bottom: 15px;
            font-size: 1.1rem;
            color: #aaa;
            text-align: center;
        }
        /* Device Wrappers */
        .device-wrapper {
            position: relative;
            background-color: #000;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .mobile-wrapper {
            width: 375px;
            height: 812px;
        }
        /* For iPads, we want to scale them down so they fit on most screens */
        .ipad-wrapper {
            width: 1024px;
            height: 768px;
            transform: scale(0.6);
            transform-origin: center center;
            margin: -150px -200px; /* Adjust margins to compensate for scale */
        }
        @media (min-width: 1800px) {
            .ipad-wrapper {
                transform: scale(0.7);
                margin: -110px -150px;
            }
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <header>
        <h1>Rich Aroma OS - Flow Simulator</h1>
        <button onclick="reloadFrames()">Reload All Frames</button>
    </header>
    <div class="container">
        <!-- Customer Mobile App -->
        <div class="column">
            <div class="column-title">Customer App (Mobile)</div>
            <div class="device-wrapper mobile-wrapper">
                <iframe id="frame-order" src="order.html"></iframe>
            </div>
        </div>
        
        <!-- POS iPad -->
        <div class="column">
            <div class="column-title">Point of Sale (iPad)</div>
            <div class="device-wrapper ipad-wrapper">
                <iframe id="frame-pos" src="pos-v2.html"></iframe>
            </div>
        </div>

        <!-- KDS iPad -->
        <div class="column">
            <div class="column-title">Kitchen Display (iPad)</div>
            <div class="device-wrapper ipad-wrapper">
                <iframe id="frame-kds" src="kds.html"></iframe>
            </div>
        </div>
    </div>

    <script>
        function reloadFrames() {
            const frames = ['frame-order', 'frame-pos', 'frame-kds'];
            frames.forEach(id => {
                const iframe = document.getElementById(id);
                if (iframe) {
                    const src = iframe.src;
                    iframe.src = '';
                    setTimeout(() => { iframe.src = src; }, 50);
                }
            });
        }
    </script>
</body>
</html>
