<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Socio QuimiEats | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { cyan: '#00F2FF', dark: '#0D0D0D', charcoal: '#1A1A1A', gold: '#C9A66B' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0D0D0D; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .tab-active { color: #00F2FF; border-bottom: 2px solid #00F2FF; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-dark z-[100] flex items-center justify-center p-6">
        <div class="max-w-sm w-full space-y-8 text-center">
            <h1 class="text-4xl font-black italic tracking-tighter text-cyan">QUIMI<span class="text-white">EATS</span></h1>
            <div class="glass p-8 rounded-[3rem] space-y-6">
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black text-cyan uppercase tracking-widest block mb-2">ID de Restaurante</label>
                        <input type="text" id="login-res-id" placeholder="ej: burger-station" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center font-bold text-white outline-none focus:border-cyan">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-cyan uppercase tracking-widest block mb-2">PIN de Acceso</label>
                        <input type="password" id="login-pin" maxlength="4" placeholder="****" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl text-center text-3xl tracking-[0.5em] font-black text-white outline-none focus:border-cyan">
                    </div>
                </div>
                <button onclick="handlePartnerLogin()" class="w-full bg-cyan text-dark py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">Entrar al Panel</button>
                <p class="text-[9px] text-white/20 uppercase font-bold">Solicita tus credenciales en el sitio principal</p>
            </div>
        </div>
    </div>

    <!-- Main Header (Hidden initially) -->
    <header id="main-header" class="hidden h-16 bg-charcoal border-b border-white/5 flex items-center justify-between px-6 shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-cyan/10 rounded-xl flex items-center justify-center text-cyan border border-cyan/20">
                <i class="fas fa-store"></i>
            </div>
            <div>
                <h2 id="display-res-name" class="font-black uppercase tracking-tight text-sm">Cargando...</h2>
                <p class="text-[9px] text-cyan font-black uppercase tracking-widest">Socio Verificado</p>
            </div>
        </div>
        <button onclick="logout()" class="text-white/20 hover:text-white transition-colors text-xs font-bold uppercase">Salir</button>
    </header>

    <!-- Navigation -->
    <nav id="main-nav" class="hidden bg-charcoal border-b border-white/5 px-6 flex gap-6">
        <button onclick="switchTab('menu')" id="tab-menu" class="py-4 text-[10px] font-black uppercase tracking-widest tab-active">Mi Menú</button>
        <button onclick="switchTab('orders')" id="tab-orders" class="py-4 text-[10px] font-black uppercase tracking-widest text-white/40">Órdenes Live</button>
        <button onclick="switchTab('wallet')" id="tab-wallet" class="py-4 text-[10px] font-black uppercase tracking-widest text-white/40">Mi Billetera</button>
    </nav>

    <!-- Content Area -->
    <main id="main-content" class="hidden flex-1 overflow-y-auto p-6">
        
        <!-- SECTION: MENU -->
        <div id="section-menu" class="space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="text-xl font-black uppercase tracking-tight">Gestión de Productos</h3>
                <button onclick="openAddModal()" class="bg-cyan text-dark px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95 transition-all">+ Nuevo Item</button>
            </div>
            
            <div id="partner-menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Items Injected Here -->
            </div>
        </div>

        <!-- SECTION: ORDERS -->
        <div id="section-orders" class="hidden space-y-6 text-center py-20">
            <i class="fas fa-rocket text-4xl text-cyan/20 mb-4"></i>
            <h3 class="text-xl font-black uppercase">Próximamente</h3>
            <p class="text-white/40 text-sm">El KDS para socios estará disponible pronto.</p>
        </div>

        <!-- SECTION: WALLET -->
        <div id="section-wallet" class="hidden space-y-6">
            <div class="glass p-8 rounded-[3rem] border-cyan/20 flex flex-col items-center text-center space-y-4">
                <p class="text-[10px] font-black text-cyan uppercase tracking-[0.3em]">Saldo por Cobrar (Rico Cash)</p>
                <h4 id="wallet-balance" class="text-5xl font-black text-white font-mono">L 0.00</h4>
                <button class="bg-white/5 border border-white/10 px-8 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest text-white/40">Solicitar Retiro</button>
            </div>
        </div>

    </main>

    <!-- Add/Edit Item Modal -->
    <div id="item-modal" class="hidden fixed inset-0 bg-dark/95 backdrop-blur-md z-[200] flex items-center justify-center p-6">
        <div class="bg-charcoal w-full max-w-sm rounded-[3rem] p-8 space-y-6 shadow-2xl border border-white/5">
            <h3 class="text-2xl font-black uppercase tracking-tight text-center">Editar Producto</h3>
            <div class="space-y-4">
                <div id="mod-img-preview" class="w-full h-40 bg-white/5 rounded-[2rem] border border-dashed border-white/10 flex items-center justify-center overflow-hidden">
                    <i class="fas fa-image text-4xl text-white/10"></i>
                </div>
                <input type="file" id="item-file" class="hidden" accept="image/*" onchange="handleFile(this)">
                <button onclick="document.getElementById('item-file').click()" class="w-full py-2 text-[9px] font-black uppercase text-cyan">Cambiar Imagen</button>
                
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-white/20 uppercase ml-4">Nombre</label>
                    <input type="text" id="item-name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl font-bold outline-none focus:border-cyan">
                </div>
                <div class="space-y-1">
                    <label class="text-[9px] font-black text-white/20 uppercase ml-4">Precio (Lps)</label>
                    <input type="number" id="item-price" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl font-black text-2xl outline-none focus:border-cyan">
                </div>
            </div>
            <div class="grid grid-cols-1 gap-3 pt-4">
                <button onclick="saveItem()" id="save-btn" class="w-full bg-cyan text-dark py-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 shadow-xl">Guardar Cambios</button>
                <button onclick="closeAddModal()" class="w-full py-4 text-white/20 font-bold uppercase text-[10px]">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let restaurantId = null;
        let menuItems = [];
        let logoBase64 = null;

        function handlePartnerLogin() {
            const resId = document.getElementById('login-res-id').value.trim();
            const pin = document.getElementById('login-pin').value;
            
            if (!resId || !pin) return alert("Completa los datos");

            // Simple validation for now, will connect to DB soon
            restaurantId = resId;
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('main-header').classList.remove('hidden');
            document.getElementById('main-nav').classList.remove('hidden');
            document.getElementById('main-content').classList.remove('hidden');
            
            document.getElementById('display-res-name').innerText = restaurantId.replace('-', ' ');
            loadMenu();
        }

        async function loadMenu() {
            const res = await fetch(`/api/store?action=menu&restaurantId=${restaurantId}`);
            const data = await res.json();
            menuItems = data.items;
            renderMenu();
        }

        function renderMenu() {
            const grid = document.getElementById('partner-menu-grid');
            grid.innerHTML = menuItems.map(i => `
                <div class="glass p-6 rounded-[2.5rem] flex items-center gap-6 relative group border-white/5 hover:border-cyan/20 transition-all">
                    <div class="w-20 h-20 bg-charcoal rounded-2xl overflow-hidden shrink-0 border border-white/5">
                        <img src="${i.image_url || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-black uppercase text-sm truncate">${i.name}</h4>
                        <p class="text-cyan font-black font-mono text-lg mt-1">L ${parseFloat(i.price).toFixed(0)}</p>
                    </div>
                    <button class="absolute top-4 right-4 text-white/20 hover:text-cyan transition-colors"><i class="fas fa-edit text-xs"></i></button>
                </div>
            `).join('');
        }

        function switchTab(tabId) {
            ['menu', 'orders', 'wallet'].forEach(t => {
                document.getElementById('section-' + t).classList.toggle('hidden', t !== tabId);
                document.getElementById('tab-' + t).classList.toggle('tab-active', t === tabId);
                document.getElementById('tab-' + t).classList.toggle('text-white/40', t !== tabId);
            });
        }

        function openAddModal() { document.getElementById('item-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('item-modal').classList.add('hidden'); }

        function logout() { location.reload(); }

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                logoBase64 = e.target.result;
                document.getElementById('mod-img-preview').innerHTML = `<img src="${logoBase64}" class="w-full h-full object-cover">`;
            };
            reader.readAsDataURL(file);
        }

        async function saveItem() {
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            if (!name || !price) return alert("Campos obligatorios");

            const btn = document.getElementById('save-btn');
            btn.innerText = "SUBIENDO..."; btn.disabled = true;

            try {
                // Here we will call a new partner-only API action
                alert("¡Felicidades! Tu producto ha sido guardado y ya está en tu menú.");
                location.reload();
            } catch(e) { alert("Error"); btn.disabled = false; }
        }

    </script>
</body>
</html>
