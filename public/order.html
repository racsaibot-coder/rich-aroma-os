<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | Ordenar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A66B',
                        dark: '#1E1610',
                        charcoal: '#2C241E',
                        cream: '#F5F5F0'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Playfair Display', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1E1610; color: #F5F5F0; font-family: 'Inter', sans-serif; }
        .gold-btn { background: linear-gradient(135deg, #C9A66B 0%, #B08D55 100%); color: #1E1610; }
        .item-card { background: rgba(44, 36, 30, 0.6); border: 1px solid rgba(201, 166, 107, 0.1); backdrop-filter: blur(10px); }
        .floating-cart { box-shadow: 0 -4px 20px rgba(0,0,0,0.4); }
        .quantity-btn:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="sticky top-0 z-50 bg-dark/95 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center">
        <div>
            <h1 class="font-display text-xl text-gold font-bold tracking-wide">RICH AROMA</h1>
            <p class="text-xs text-white/50 tracking-widest uppercase">Quimistán, HN</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-gold/10 flex items-center justify-center">
            <i class="fas fa-coffee text-gold"></i>
        </div>
    </header>

    <!-- Menu Section -->
    <main class="px-4 py-6 space-y-8">
        
        <!-- Category: Bebidas -->
        <div>
            <h2 class="text-gold text-sm font-bold uppercase tracking-widest mb-4 border-l-2 border-gold pl-3">Bebidas Signature</h2>
            <div class="space-y-4">
                <!-- Item 1 -->
                <div class="item-card rounded-2xl p-4 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-charcoal rounded-xl flex items-center justify-center text-3xl">☕️</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">Latte Macchiato</h3>
                        <p class="text-xs text-white/60 mb-2">Espresso doble, leche texturizada.</p>
                        <div class="flex justify-between items-center">
                            <span class="text-gold font-mono font-bold">L 65.00</span>
                            <button onclick="addToCart('Latte Macchiato', 65)" class="w-8 h-8 rounded-full bg-gold text-dark flex items-center justify-center quantity-btn">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Item 2 -->
                <div class="item-card rounded-2xl p-4 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-charcoal rounded-xl flex items-center justify-center text-3xl">🧊</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">Cold Brew #42</h3>
                        <p class="text-xs text-white/60 mb-2">Maceración en frío 18h. Notas a chocolate.</p>
                        <div class="flex justify-between items-center">
                            <span class="text-gold font-mono font-bold">L 75.00</span>
                            <button onclick="addToCart('Cold Brew #42', 75)" class="w-8 h-8 rounded-full bg-gold text-dark flex items-center justify-center quantity-btn">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Category: Comida -->
        <div>
            <h2 class="text-gold text-sm font-bold uppercase tracking-widest mb-4 border-l-2 border-gold pl-3">Comida</h2>
            <div class="space-y-4">
                <!-- Item 3 -->
                <div class="item-card rounded-2xl p-4 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-charcoal rounded-xl flex items-center justify-center text-3xl">🥞</div>
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">Crêpe Clásico</h3>
                        <p class="text-xs text-white/60 mb-2">Nutella, fresas frescas, azúcar glass.</p>
                        <div class="flex justify-between items-center">
                            <span class="text-gold font-mono font-bold">L 95.00</span>
                            <button onclick="addToCart('Crêpe Clásico', 95)" class="w-8 h-8 rounded-full bg-gold text-dark flex items-center justify-center quantity-btn">
                                <i class="fas fa-plus text-xs"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Floating Cart -->
    <div id="cart-bar" class="fixed bottom-6 left-4 right-4 bg-gold rounded-2xl p-4 floating-cart flex justify-between items-center transform translate-y-[150%] transition-transform duration-300 z-50">
        <div class="flex flex-col">
            <span class="text-dark text-xs font-bold uppercase tracking-wider">Total</span>
            <span id="cart-total" class="text-dark font-display font-bold text-xl">L 0.00</span>
        </div>
        <button onclick="checkout()" class="bg-dark text-gold px-6 py-3 rounded-xl font-bold text-sm shadow-lg flex items-center gap-2 active:scale-95 transition-transform">
            <span>Confirmar Orden</span>
        </button>
    </div>

    <script>
        let cart = [];
        const SHOP_PHONE = "50495200236"; // Replace with actual shop number
        let currentCustomer = null;

        // Load customer profile if logged in
        async function loadProfile() {
            const phone = localStorage.getItem('ra_phone');
            if (phone) {
                try {
                    const res = await fetch(`/api/customer/profile?phone=${phone}`);
                    if (res.ok) {
                        currentCustomer = await res.json();
                        // Update UI header
                        const headerDiv = document.querySelector('header div:first-child');
                        headerDiv.innerHTML += `<div class="mt-1 inline-block bg-gold/20 text-gold text-[10px] px-2 py-1 rounded-full"><i class="fas fa-star"></i> Hola, ${currentCustomer.name.split(' ')[0]} (${currentCustomer.points || 0} pts)</div>`;
                    }
                } catch(e) { console.error('Error loading profile', e); }
            }
        }
        window.addEventListener('DOMContentLoaded', loadProfile);

        function addToCart(name, price) {
            cart.push({ name, price });
            updateCartUI();
            
            // Subtle feedback
            const btn = event.currentTarget;
            btn.classList.add('scale-90');
            setTimeout(() => btn.classList.remove('scale-90'), 100);
        }

        function updateCartUI() {
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = `L ${total.toFixed(2)}`;
            
            const cartBar = document.getElementById('cart-bar');
            if (cart.length > 0) {
                cartBar.classList.remove('translate-y-[150%]');
            } else {
                cartBar.classList.add('translate-y-[150%]');
            }
        }

        async function checkout() {
            if (cart.length === 0) return;
            const btn = document.querySelector('#cart-bar button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;

            const counts = {};
            cart.forEach(item => {
                counts[item.name] = (counts[item.name] || 0) + 1;
            });

            const items = [];
            let total = 0;
            for (const [name, count] of Object.entries(counts)) {
                const item = cart.find(i => i.name === name);
                items.push({ id: name.toLowerCase().replace(/ /g, '_'), name: name, price: item.price, quantity: count });
                total += item.price * count;
            }

            try {
                const payload = {
                    items,
                    subtotal: total,
                    total,
                    paymentMethod: 'cash',
                    notes: 'Online Order (Pickup)'
                };
                if (currentCustomer) {
                    payload.customerId = currentCustomer.id;
                }
                const res = await fetch('/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (!res.ok) throw new Error('Error saving order');
                
                alert('¡Orden recibida! La estamos preparando.');
                cart = [];
                updateCartUI();
            } catch (err) {
                alert('Hubo un error, por favor intenta de nuevo.');
                console.error(err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
