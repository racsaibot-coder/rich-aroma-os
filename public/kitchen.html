<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rich Aroma | Kitchen Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#C9A66B',
                        dark: '#120C09',
                        charcoal: '#1E1610',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #120C09; color: white; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .order-card { transition: transform 0.2s active:scale-95; }
        .status-badge { font-size: 9px; font-weight: 900; letter-spacing: 0.1em; }
        header { pointer-events: auto !important; }
        button { pointer-events: auto !important; position: relative; z-index: 70; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- MOBILE KDS HEADER -->
    <header class="bg-dark/95 backdrop-blur-md p-4 sticky top-0 z-[60] flex justify-between items-center border-b border-white/5 shadow-2xl shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gold/20 rounded-xl flex items-center justify-center text-gold border border-gold/30">
                <i class="fas fa-fire-alt"></i>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-widest uppercase text-white/90">Kitchen Mobile</h1>
                <p id="sync-status" class="text-[8px] text-white/30 font-bold uppercase tracking-widest">Iniciando...</p>
            </div>
        </div>
        
        <!-- Mode Toggle -->
        <div class="flex bg-white/5 rounded-full p-1 border border-white/10 relative z-[70]">
            <button onclick="setMode('drinks')" id="btn-drinks" class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all bg-gold text-dark pointer-events-auto">Barista</button>
            <button onclick="setMode('food')" id="btn-food" class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all text-white/40 pointer-events-auto">Cocina</button>
        </div>
    </header>

    <!-- LIVE ORDERS LIST -->
    <main class="flex-1 p-4 space-y-4 pb-20" id="kds-container">
        <div class="py-20 text-center space-y-4 opacity-20">
            <i class="fas fa-circle-notch fa-spin text-3xl"></i>
            <p class="text-[10px] font-black uppercase tracking-widest">Esperando Órdenes...</p>
        </div>
    </main>

    <script>
        let orders = [];
        let currentMode = 'drinks'; 

        window.onload = () => {
            fetchOrders();
            setInterval(fetchOrders, 5000);
        };

        async function fetchOrders() {
            try {
                const res = await fetch('/api/orders');
                const data = await res.json();
                orders = data.orders || [];
                renderKDS();
                document.getElementById('sync-status').innerText = 'Sync: ' + new Date().toLocaleTimeString();
            } catch (e) {
                console.error("KDS Fetch Error:", e);
                document.getElementById('sync-status').innerText = 'Error Sync';
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const btnDrinks = document.getElementById('btn-drinks');
            const btnFood = document.getElementById('btn-food');
            if (mode === 'drinks') {
                btnDrinks.className = "px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all bg-gold text-dark";
                btnFood.className = "px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all text-white/40";
            } else {
                btnDrinks.className = "px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all text-white/40";
                btnFood.className = "px-4 py-1.5 rounded-full text-[9px] font-black uppercase transition-all bg-gold text-dark";
            }
            renderKDS();
        }

        function isDrink(item) {
            if (!item) return false;
            const name = (item.name || '').toLowerCase();
            const id = (item.id || '').toLowerCase();
            if (id === 'vip_membership' || name.includes('membresía')) return false;
            return id.startsWith('hot_') || id.startsWith('cold_') || id.startsWith('frappe_') || 
                   name.includes('latte') || name.includes('brew') || name.includes('capp') || 
                   name.includes('tea') || name.includes('te ') || name.includes('icee') || 
                   name.includes('espresso') || name.includes('mocha') || name.includes('matcha') || 
                   name.includes('frappe') || name.includes('macchiato') || name.includes('jugo') || 
                   name.includes('licuado') || name.includes('granita') || name.includes('smoothie') || 
                   name.includes('caliente') || name.includes('helada') || name.includes('americano') ||
                   name.includes('chocolate') || name.includes('cafe') || name.includes('café') ||
                   name.includes('combo');
        }

        function isFood(item) {
            if (!item) return false;
            const name = (item.name || '').toLowerCase();
            const id = (item.id || '').toLowerCase();
            if (id === 'vip_membership' || name.includes('membresía')) return false;
            return id.startsWith('food_') || name.includes('baleada') || name.includes('sandwich') || 
                   name.includes('crepa') || name.includes('bowl') || name.includes('toast') || 
                   name.includes('melt') || name.includes('fries') || name.includes('papas') || 
                   name.includes('burger') || name.includes('hamburguesa') || name.includes('combo');
        }

        function getDisplayName(order) {
            if (order.customers?.name) return order.customers.name;
            if (order.notes) {
                const clientMatch = order.notes.match(/\[CLIENTE:\s*([^\]]+)\]/);
                if (clientMatch) return clientMatch[1].trim();
                const guestMatch = order.notes.match(/\[GUEST:\s*([^|\]]+)/);
                if (guestMatch) return guestMatch[1].trim();
            }
            return 'Invitado';
        }

        function renderKDS() {
            const container = document.getElementById('kds-container');
            
            const activeOrders = orders.filter(o => {
                if (['completed', 'cancelled', 'ready'].includes(o.status)) return false;
                
                // Approve logic: Hide pending cash/transfer orders until approved/paid
                if (o.status === 'pending' && (o.payment_method === 'cash' || o.payment_method === 'transfer')) return false;

                if (currentMode === 'drinks' && o.status === 'drinks_ready') return false;
                if (currentMode === 'food' && o.status === 'food_ready') return false;

                const items = o.items || [];
                return items.some(i => currentMode === 'drinks' ? isDrink(i) : isFood(i));
            });

            if (activeOrders.length === 0) {
                container.innerHTML = '<div class="py-20 text-center opacity-20"><p class="text-[10px] font-black uppercase tracking-widest">Sin órdenes pendientes</p></div>';
                return;
            }

            container.innerHTML = activeOrders.map(o => {
                const items = (o.items || []).filter(i => currentMode === 'drinks' ? isDrink(i) : isFood(i));
                const isPrep = o.status === 'preparing';
                const orderNum = o.order_number ? o.order_number.toString().padStart(2, '0') : '---';
                const custName = getDisplayName(o);
                const status = o.status || 'pending';
                
                let typeText = '🍽️ AQUÍ';
                if (o.notes && o.notes.includes('[TYPE: pickup]')) typeText = '🛍️ LLEVAR';
                if (o.notes && o.notes.includes('[TYPE: delivery]')) typeText = '🚗 DELIVERY';

                return `
                    <div class="bg-white/5 border border-white/10 rounded-[2rem] p-6 space-y-4 shadow-xl order-card ${isPrep ? 'border-orange-500/30 bg-orange-500/5' : ''}">
                        <div class="flex justify-between items-start gap-4">
                            <div class="flex items-start gap-3 overflow-hidden">
                                <span class="bg-gold text-dark px-3 py-2 rounded-xl font-black text-lg shadow-lg shadow-gold/20 shrink-0">#${orderNum}</span>
                                <div class="overflow-hidden">
                                    <h2 class="font-black text-sm uppercase truncate tracking-tight text-white/90">${custName}</h2>
                                    <span class="bg-white/5 text-gold border border-white/5 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest mt-1.5 inline-block">${typeText}</span>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <p class="text-[10px] font-black text-white/30">${new Date(o.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                <span class="status-badge ${isPrep ? 'text-orange-500' : 'text-blue-500'} animate-pulse uppercase">${status}</span>
                            </div>
                        </div>

                        <div class="space-y-3 py-2">
                            ${items.map(i => `
                                <div class="flex gap-3">
                                    <span class="font-black text-gold text-sm">${i.qty || i.quantity || 1}x</span>
                                    <div>
                                        <p class="font-bold text-sm uppercase leading-tight">${i.name}</p>
                                        <p class="text-[10px] text-white/40 mt-1 font-medium">${(i.mods || []).map(m => m.name).join(', ')}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="pt-2">
                            ${!isPrep ? 
                                `<button onclick="updateStatus('${o.id}', 'preparing')" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20 active:scale-95 transition-all">Empezar</button>` :
                                `<button onclick="completeOrder('${o.id}')" class="w-full bg-success text-dark py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-green-900/20 active:scale-95 transition-all">Listo</button>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function completeOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;

            let hasDrinks = (order.items || []).some(i => isDrink(i));
            let hasFood = (order.items || []).some(i => isFood(i));

            let newStatus = 'ready'; // Default

            if (hasDrinks && hasFood) {
                if (currentMode === 'drinks') {
                    newStatus = (order.status === 'food_ready') ? 'ready' : 'drinks_ready';
                } else if (currentMode === 'food') {
                    newStatus = (order.status === 'drinks_ready') ? 'ready' : 'food_ready';
                }
            }

            await updateStatus(id, newStatus);
        }

        async function updateStatus(id, status) {
            try {
                const res = await fetch('/api/orders/' + id, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status })
                });
                if (res.ok) {
                    await fetchOrders();
                } else {
                    const err = await res.json();
                    alert("Error: " + (err.error || "No se pudo actualizar"));
                }
            } catch (e) { 
                console.error("KDS Update Error:", e);
                alert("Error de conexión al actualizar");
            }
        }
    </script>
</body>
</html>
